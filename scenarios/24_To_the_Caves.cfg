#textdomain wesnoth-The_Ice_Age
[scenario]
	id=24_To_the_Caves
	next_scenario=25_Stone_of_Destiny
	name=To the Caves
	map_data="{~add-ons/The_Ice_Age/maps/24_To_the_Caves.map}"
	turns=35
	victory_when_enemies_defeated=no
	{SECOND_WATCH}
	{DAWN}
	{MORNING}
	{AFTERNOON}
	{DUSK}
	{FIRST_WATCH}

	{DEFAULT_MUSIC_PLAYLIST}
	[story]
		[part]
			story= _ "With Acacia as their guide, our heroes set out once again. In a day, they were within sight of the very cave that housed the ancient artifact- the Stone of Destiny."
			background=story/twilight-night.png
		[/part]
	[/story]
	[event]
		name=prestart
		[objectives]
			side=1
			[objective]
				description= _ "Jobath must enter the Caves of Destiny"
				condition=win
			[/objective]
			[objective]
				description= _ "Death of a Hero"
				condition=lose
			[/objective]
			{TURNS_RUN_OUT}
			[gold_carryover]
				bonus=yes
				carryover_percentage=40
			[/gold_carryover]
		[/objectives]
	[/event]
	[side]
		side=1
		color=frozen
		controller=human
		team_name=1
		user_team_name= _ "Jobath's forces"
		type=Young_chieftain
		id=Jobath
		name= _ "Jobath"
		unrenamable=yes
		canrecruit=yes
		recruit=Tree Fairy,Faerie Sprite

		{GOLD 250 200 150}
		{ICE_FLAG}
		{INCOME 2 1 0}
	[/side]
	[side]
		side=2
		controller=ai
		team_name=2
		user_team_name= _ "Cave Guardians"
		type=Armageddon Drake
		id=Fire
		name= _ "Guardian of Flame"
		unrenamable=yes
		canrecruit=yes
		recruit=Drake Enforcer,Drake Warden,Inferno Drake,Drake Blademaster,Hurricane Drake

		{GOLD 350 450 600}
		{INCOME 15 20 30}
	[/side]
	[side]
		side=3
		controller=ai
		team_name=2
		user_team_name= _ "Cave Guardians"
		type=Death Knight
		id=Evilest
		name= _ "Evilest"
		unrenamable=yes
		canrecruit=yes
		recruit=Spectre,Nightgaunt,Wraith
		{GOLD 250 400 450}
		{INCOME 4 6 9}
		[ai]
			caution=1.0
			passive_leader=yes
			[protect_location]
				x=53-57
				y=20-30
				radius=7
			[/protect_location]
		[/ai]
	[/side]
	[side]
		side=4
		controller=ai
		team_name=3
		user_team_name= _ "Geannan"
		type=Shadow Phantarch
		id=Pharaoh
		name= _ "Neferhotep"
		unrenamable=yes
		canrecruit=yes
		recruit=Shadow Mage,Shadow Hud,Shadow Phantarch,Shadow Fighter,Shadow Captain,Shadow Marshal,Shadow Hero,Shadow Champion,Shadow Assassin,Shadow Slayer,Shadow Nightblade,Shadow Hunter,Shadow Sportsman,Shadow Deerstalker
		{GOLD 250 350 500}
		{INCOME 8 12 16}
	[/side]

	{PLACE_IMAGE items/gohere.png 55 23}
	[event]
		name=start
		[recall]
			id=Madoc
		[/recall]
		[recall]
			id=Stripes
		[/recall]
		[recall]
			id=Cutie
		[/recall]
		[recall]
			id=Sister
		[/recall]
		[recall]
			id=Ashkenaz
		[/recall]
		[recall]
			id=Oldman
		[/recall]
		[recall]
			id=Twilight_Princess
		[/recall]
		[message]
			speaker=Twilight_Princess
			message= _ "Here we are...the caves. If you hurry, you can be inside within a few days."
		[/message]
		[message]
			speaker=Jobath
			message= _ "Thank you for guiding us here."
		[/message]
		[message]
			speaker=Twilight_Princess
			message= _ "You aren't the only one who wants to get rid of the Afanc. Really, it's the least we can do."
		[/message]
		[message]
			speaker=Evilest
			message= _ "An army is coming. I must not let the Stone fall into the hands of evil. Die, ye unworthy ones!"
		[/message]
		[message]
			speaker=Pharaoh
			message= _ "Yes, that guardian is finally distracted. Maybe I can defeat him now."
		[/message]
		[message]
			speaker=Jobath
			message= _ "I must reach the cave entrance."
		[/message]
		{HIGHLIGHT_IMAGE 30 8 items/gohere.png ()}
		[message]
			speaker=narrator
			message= _ "You can again recall your warriors. However, because of the separation at the portal, you can only recruit the tree fairies."
			image=wesnoth-icon.png
		[/message]
	[/event]
	[event]
		name=enter hex
		first_time_only=yes

		[filter]
			x=6
			y=5
			side=1
		[/filter]
		[unit]
			id=FORESTDRAGON
			name="ForestDragon"
			type="Forest Dragon"
			x,y=6,5
			ignore_race_traits=yes
			side=1
			unrenamable=yes
			num_traits=3
			[modifications]
				{TRAIT_LOYAL}
				{TRAIT_HEALTHY}
				{TRAIT_QUICK}
			[/modifications]
		[/unit]
		[message]
			id=Cutie
			message= _ "Eek, another dragon!"
		[/message]
		[message]
			id=FORESTDRAGON
			message= _ "Calm down, I am not on their side!"
		[/message]
		[message]
			id=Jobath
			message= _ "What is that?"
		[/message]
		[message]
			id=Twilight_Princess
			message= _ "This is the Forest Dragon. Unlike the invaders, he has helped keep a balance in the Otherworld. He is one of the guardians of the Otherworld, half sidhe half dragon. (turns to ForestDragon) But where we you when we were attacked?"
		[/message]
		[message]
			id=FORESTDRAGON
			message= _ "Uhhhhh, I was doing important things!"
		[/message]
		[message]
			id=Twilight_Princess
			message= _ "Procrastinating again... No matter, we need your help to get the Stone of Destiny. Could you please go with us?"
		[/message]
		[message]
			id=FORESTDRAGON
			message= _ "Very well. Anyone threatening the forest will face my wrath!"
		[/message]
	[/event]
	[event]
		name=moveto
		[filter]
			id=Jobath
			x=30
			y=8
		[/filter]
		[message]
			id=Jobath
			message= _ "Hurry, into the caves, everyone! Acacia, go back and tell your father we made it safely."
		[/message]
		[message]
			id=Twilight_Princess
			message= _ "Are you crazy? I'm not going back through that gauntlet again. I'll make sure you actually live long enough to get the Stone, then we'll see about getting me back."
		[/message]
		[message]
			id=Jobath
			message= _ "Um, ok."
		[/message]
		[endlevel]
			result=victory
			bonus=yes
		[/endlevel]
	[/event]
	{HERO_DEATHS}
	{~add-ons/The_Ice_Age/utils/deaths.cfg}
	{~add-ons/The_Ice_Age/utils/flag.cfg}
	
	{HEALER_RECALL}
[/scenario]
