#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Banfaith
	name= _ "Head Banfaith"
	race=iceage
	gender=female
	image="units/poetess/banfaith.png"
	profile="portraits/humans/mage-silver+female.png"
	hitpoints=60
	movement_type=iceagefoot
	movement=6
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=59
	usage=healer
	description= _ "Banfaiths were often the spiritual leaders in certain tribes long ago. With a vast knowledge of poetry, healing, and perhaps, prophecy, they are well respected by all. They seem to have a knack for getting out of sticky situations."+_"SPECIAL_NOTE^ Gold Magi are well-attuned to their magical natures and are highly resistant to non-physical damage."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
	[resistance]
		fire=40
		cold=40
	[/resistance]
	[abilities]
		{ABILITY_TELEPORT}
		{ABILITY_SKIRMISHER}
		{ABILITY_CURES}
	[/abilities]
	{DEFENSE_ANIM "units/poetess/banfaith-defend-2.png" "units/poetess/banfaith-defend-1.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[attack]
		name=staff
		description=_"staff"
		icon=attacks/staff-magic.png
		type=impact
		range=melee
		damage=12
		number=2
	[/attack]
	[attack]
		name=missile
		description=_"missile"
		icon=attacks/magic-missile.png
		type=fire
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=9
		number=5
	[/attack]
	[attack]
		name=iceball
		description=_"Icicle Storm"
		icon=attacks/iceball.png
		type=cold
		range=ranged
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=10
		number=4
	[/attack]
	[attack]
		name=satire
		description=_"Satire"
		type=arcane
		range=ranged
		icon=attacks/curse.png
		[specials]
			{WEAPON_SPECIAL_DRAIN}
		[/specials]
		damage=8
		number=4
	[/attack]
	[attack_anim]
		[filter_attack]
			name=satire
		[/filter_attack]

		missile_start_time=-200
		start_time=-350
		halo1_start_time=-350
		halo2_start_time=-200
		sound_start_time=0

		[missile_frame]
			halo="halo/elven/druid-healing[8~1].png~CS(50,-30,-50):50"
			offset=1.0~0.0
		[/missile_frame]

		[frame]
			image="units/poetess/banfaith.png:150"
		[/frame]
		[frame]
			image="units/poetess/banfaith-magic-1.png:450"
		[/frame]
		[frame]
			image="units/poetess/banfaith-magic-2.png:150"
		[/frame]

		[halo1_frame]
			halo="halo/elven/nature-halo[8~1].png~CS(50,-30,-50)~O([80%*2,60%,40%,30%,20%*3]):75"
			offset=1.0
			auto_vflip=no
			auto_hflip=no
		[/halo1_frame]

		[halo2_frame]
			halo="halo/elven/nature-halo[1~8].png~CS(50,-30,-50)~O([20%*3,30%,40%,60%,80%*2]):75"
			offset=0.0
			auto_vflip=no
			auto_hflip=no
		[/halo2_frame]

		[sound_frame]
			sound=magicmissile.wav
		[/sound_frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=missile
		[/filter_attack]
		{MISSILE_FRAME_FIREBALL_XY 11 -20}

		start_time=-575
		[frame]
			image="units/poetess/banfaith.png:50"
		[/frame]
		[frame]
			image="units/poetess/banfaith-magic-1.png:100"
		[/frame]
		[frame]
			image="units/poetess/banfaith-magic-[2,1].png:[150,75]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/poetess/banfaith.png:75"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=iceball
		[/filter_attack]

		{MISSILE_FRAME_ICE}
		[frame]
			image="units/poetess/banfaith-magic-[1,2,1].png:100"
		[/frame]
		{HALO_FRAME_SAURIAN}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]

		start_time=-200

		[frame]
			image="units/poetess/banfaith.png:350"
		[/frame]

		{SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
	[/attack_anim]
   [/unit_type]
