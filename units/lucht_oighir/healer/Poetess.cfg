#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Poetess
	name= _ "Advanced Poetess"
	race=iceage
	gender=female
	image="units/poetess/poetess.png"
	hitpoints=42
	movement_type=iceagefoot
	movement=5
	experience=100
	level=2
	alignment=neutral
	advances_to=Banfaith
	cost=40
	usage=healer
	description= _ "."
	die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
	{DEFENSE_ANIM "units/poetess/poetess-defend-2.png" "units/poetess/poetess-defend-1.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[resistance]
		fire=90
	[/resistance]
	[abilities]
		{ABILITY_CURES}
	[/abilities]
	[attack]
		name=staff
		description=_"staff"
		icon=attacks/staff-magic.png
		type=impact
		range=melee
		damage=8
		number=2
	[/attack]
	[attack]
		name=fireball
		description=_"fireball"
		type=fire
		range=ranged
		icon=attacks/fireball.png
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=8
		number=4
	[/attack]
	[attack]
		name=iceball
		description=_"Chill Wave"
		type=cold
		range=ranged
		icon=attacks/iceball.png
		[specials]
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=10
		number=3
	[/attack]
	[attack]
		name=satire
		description=_"Satire"
		type=arcane
		range=ranged
		icon=attacks/curse.png
		[specials]
			{WEAPON_SPECIAL_DRAIN}
		[/specials]
		damage=9
		number=3
	[/attack]
	[attack_anim]
		[filter_attack]
			name=satire
		[/filter_attack]

		missile_start_time=-200
		start_time=-350
		halo1_start_time=-350
		halo2_start_time=-200
		sound_start_time=0

		[missile_frame]
			halo="halo/elven/druid-healing[8~1].png~CS(50,-30,-50):50"
			offset=1.0~0.0
		[/missile_frame]

		[frame]
			image="units/poetess/poetess.png:200"
		[/frame]
		[frame]
			image="units/poetess/poetess-magic.png:300"
		[/frame]

		[halo1_frame]
			halo="halo/elven/nature-halo[8~1].png~CS(50,-30,-50)~O([80%*2,60%,40%,30%,20%*3]):75"
			offset=1.0
			auto_vflip=no
			auto_hflip=no
		[/halo1_frame]

		[halo2_frame]
			halo="halo/elven/nature-halo[1~8].png~CS(50,-30,-50)~O([20%*3,30%,40%,60%,80%*2]):75"
			offset=0.0
			auto_vflip=no
			auto_hflip=no
		[/halo2_frame]

		[sound_frame]
			sound=magicmissile.wav
		[/sound_frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=fireball
		[/filter_attack]
		{MISSILE_FRAME_FIREBALL_XY 11 -20}

		start_time=-575
		[frame]
			image="units/poetess/poetess.png:50"
		[/frame]
		[frame]
			image="units/poetess/poetess-magic.png:100"
		[/frame]
		[frame]
		   image="units/poetess/poetess-magic.png:[150,75]"
			sound=fire.wav
		[/frame]
		[frame]
			image="units/poetess/poetess.png:75"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=iceball
		[/filter_attack]

		{MISSILE_FRAME_ICE}
		[frame]
			image="units/poetess/poetess-magic.png:100"
		[/frame]
		{HALO_FRAME_SAURIAN}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]

		start_time=-200

		[frame]
			image="units/poetess/poetess.png:350"
		[/frame]

		{SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -125}
	[/attack_anim]
[/unit_type]
