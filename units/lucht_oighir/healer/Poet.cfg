#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Poet
    name= _ "Poet"
    race=iceage
    gender=male,female
    image="units/human-iceage/Herbalist.png"
    profile="portraits/Man.png"
    hitpoints=42
    movement_type=iceagefoot
    movement=5
    experience=120
    level=2
    alignment=neutral
    advances_to=Bard
    cost=40
    usage=healer
    description= _ "Poets are the result of five years training among the bards. Upon reaching this point, some poets have already started their own groups of followers. Though they have yet to plumb the deepest secrets of herb collecting and bardic lore, they are well on their way."
    die_sound={SOUND_LIST:HUMAN_DIE}
    {DEFENSE_ANIM "units/human-iceage/Herbalist.png" "units/human-iceage/Herbalist.png" {SOUND_LIST:HUMAN_OLD_HIT} }
    [resistance]
        fire=90
    [/resistance]
    [abilities]
        {ABILITY_CURES}
    [/abilities]
    [attack]
        name=staff
        description=_"sickle"
        icon=attacks/sickle.png
        type=blade
        range=melee
        damage=7
        number=2
    [/attack]
    [attack]
        name=dart
        description=_"dart"
        icon=attacks/javelin-orcish.png
        type=pierce
        range=ranged
        damage=6
        number=4
    [/attack] 
    [attack]
        name=satire
        description=_"Satire"
        type=arcane
        range=ranged
        icon=attacks/curse.png
        [specials]
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
        damage=7
        number=4
    [/attack]
  [attack_anim]
        [filter_attack]
            name=dart
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/dart-n.png"
            image_diagonal="projectiles/dart-ne.png"
        [/missile_frame]
        [frame]
            begin=-200
            end=-100
            image="units/human-iceage/Herbalist.png"
            sound={SOUND_LIST:THROW}
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-100
                end=50
                image="units/human-iceage/Herbalist.png"
                sound=spear.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-100
                end=50
                image="units/human-iceage/Herbalist.png"
            [/frame]
        [/else]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=satire
        [/filter_attack]

        missile_start_time=-200
        start_time=-350
        halo1_start_time=-350
        halo2_start_time=-200
        sound_start_time=0

        [missile_frame]
            halo="halo/elven/druid-healing[8~1].png~CS(50,-30,-50):50"
            offset=1.0~0.0
        [/missile_frame]

        [frame]
            image="units/human-iceage/Herbalist.png:200"
        [/frame]
        [frame]
            image="units/human-iceage/Herbalist.png:300"
        [/frame]

        [halo1_frame]
            halo="halo/elven/nature-halo[8~1].png~CS(50,-30,-50)~O([80%*2,60%,40%,30%,20%*3]):75"
            offset=1.0
            auto_vflip=no
            auto_hflip=no
        [/halo1_frame]

        [halo2_frame]
            halo="halo/elven/nature-halo[1~8].png~CS(50,-30,-50)~O([20%*3,30%,40%,60%,80%*2]):75"
            offset=0.0
            auto_vflip=no
            auto_hflip=no
        [/halo2_frame]

        [sound_frame]
            sound=magicmissile.wav
        [/sound_frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        [frame]
            begin=-250
            end=-200
            image="units/human-iceage/Herbalist.png"
        [/frame]
        [frame]
            begin=-200
            end=-100
            image="units/human-iceage/Herbalist.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-100
                end=100
                image="units/human-iceage/Herbalist.png"
                sound=staff.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-100
                end=100
                image="units/human-iceage/Herbalist.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            begin=100
            end=175
            image="units/human-iceage/Herbalist.png"
        [/frame]
        [frame]
            begin=175
            end=250
            image="units/human-iceage/Herbalist.png"
        [/frame]
    [/attack_anim]
    [female]
        name= _ "female^Poetess"
        gender=female
        image="units/human-iceage/Herbalist+female.png"
        die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
        profile="portraits/humans/mage-red+female.png"
        {DEFENSE_ANIM "units/human-iceage/Herbalist+female.png" "units/human-iceage/Herbalist+female.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
	[attack_anim]
        [filter_attack]
            name=dart
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/dart-n.png"
            image_diagonal="projectiles/dart-ne.png"
        [/missile_frame]
        [frame]
            begin=-200
            end=-100
            image="units/human-iceage/Herbalist+female.png"
            sound={SOUND_LIST:THROW}
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-100
                end=50
                image="units/human-iceage/Herbalist+female.png"
                sound=spear.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-100
                end=50
                image="units/human-iceage/Herbalist+female.png"
            [/frame]
        [/else]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=satire
        [/filter_attack]

        missile_start_time=-200
        start_time=-350
        halo1_start_time=-350
        halo2_start_time=-200
        sound_start_time=0

        [missile_frame]
            halo="halo/elven/druid-healing[8~1].png~CS(50,-30,-50):50"
            offset=1.0~0.0
        [/missile_frame]

        [frame]
            image="units/human-iceage/Herbalist+female.png:200"
        [/frame]
        [frame]
            image="units/human-iceage/Herbalist+female.png:300"
        [/frame]

        [halo1_frame]
            halo="halo/elven/nature-halo[8~1].png~CS(50,-30,-50)~O([80%*2,60%,40%,30%,20%*3]):75"
            offset=1.0
            auto_vflip=no
            auto_hflip=no
        [/halo1_frame]

        [halo2_frame]
            halo="halo/elven/nature-halo[1~8].png~CS(50,-30,-50)~O([20%*3,30%,40%,60%,80%*2]):75"
            offset=0.0
            auto_vflip=no
            auto_hflip=no
        [/halo2_frame]

        [sound_frame]
            sound=magicmissile.wav
        [/sound_frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        [frame]
            begin=-250
            end=-200
            image="units/human-iceage/Herbalist+female.png"
        [/frame]
        [frame]
            begin=-200
            end=-100
            image="units/human-iceage/Herbalist+female.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-100
                end=100
                image="units/human-iceage/Herbalist+female.png"
                sound=staff.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-100
                end=100
                image="units/human-iceage/Herbalist+female.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            begin=100
            end=175
            image="units/human-iceage/Herbalist+female.png"
        [/frame]
        [frame]
            begin=175
            end=250
            image="units/human-iceage/Herbalist+female.png"
        [/frame]
    [/attack_anim]
    [/female]
[/unit_type]
