#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Healer2
	name= _ "Healer"
	# wmllint: general spelling mage mages magery magecraft
	race=iceage
	gender=male,female
	image="units/human-iceage/Healer.png"
	profile="portraits/humans/mage.png"
	hitpoints=24
	movement_type=iceagefoot
	movement=5
	experience=60
	level=1
	alignment=neutral
	advances_to=Poet,Arcanist
	cost=20
	usage=healer
	description= _ "Healers are those people who decide to focus their minds toward healing and learning, rather than warfare. Often found in the retinue of the greatest bards, they have learned how to send a potent curse straight to their opponents. The scythe they carry is utilized to collect the herbs for the various potions they use. These ones have also begun learning an alternate magic, one which could be directed to healing themselves."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Healer.png" "units/human-iceage/Healer.png" {SOUND_LIST:HUMAN_OLD_HIT} }
	[abilities]
		{ABILITY_HEALS}
	[/abilities]
	[attack]
		name=staff
		description=_"sickle"
		icon=attacks/sickle.png
		type=blade
		range=melee
		damage=5
		number=2
	[/attack]
	[attack]
		name=dart
		description=_"dart"
		icon=attacks/javelin-orcish.png
		type=pierce
		range=ranged
		damage=5
		number=3
	[/attack] 
	[attack]
		name=satire
		description=_"Satire"
		type=arcane
		range=ranged
		icon=attacks/curse.png
		[specials]
			{WEAPON_SPECIAL_DRAIN}
		[/specials]
		damage=5
		number=3
	[/attack]
	[healing_anim]
		start_time=-200
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-1.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-2.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-3.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-4.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-5.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-6.png
		[/frame]
		[frame]
			duration=55
			image="units/human-iceage/Healer.png"
			halo=halo/teleport-7.png
		[/frame]
		[frame]
			duration=30
			image="units/human-iceage/Healer.png"
		[/frame]
	[/healing_anim]
	[attack_anim]
		[filter_attack]
			name=dart
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/dart-n.png"
			image_diagonal="projectiles/dart-ne.png"
		[/missile_frame]
		[frame]
			begin=-200
			end=-100
			image="units/human-iceage/Healer.png"
			sound={SOUND_LIST:THROW}
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=50
				image="units/human-iceage/Healer.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=50
				image="units/human-iceage/Healer.png"
			[/frame]
		[/else]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=satire
		[/filter_attack]

		missile_start_time=-200
		start_time=-350
		halo1_start_time=-350
		halo2_start_time=-200
		sound_start_time=0

		[missile_frame]
			halo="halo/elven/druid-healing[8~1].png~CS(50,-30,-50):50"
			offset=1.0~0.0
		[/missile_frame]

		[frame]
			image="units/human-iceage/Healer.png:200"
		[/frame]
		[frame]
			image="units/human-iceage/Healer.png:300"
		[/frame]

		[halo1_frame]
			halo="halo/elven/nature-halo[8~1].png~CS(50,-30,-50)~O([80%*2,60%,40%,30%,20%*3]):75"
			offset=1.0
			auto_vflip=no
			auto_hflip=no
		[/halo1_frame]

		[halo2_frame]
			halo="halo/elven/nature-halo[1~8].png~CS(50,-30,-50)~O([20%*3,30%,40%,60%,80%*2]):75"
			offset=0.0
			auto_vflip=no
			auto_hflip=no
		[/halo2_frame]

		[sound_frame]
			sound=magicmissile.wav
		[/sound_frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=staff
		[/filter_attack]
		[frame]
			begin=-250
			end=-200
			image="units/human-iceage/Healer.png"
		[/frame]
		[frame]
			begin=-200
			end=-100
			image="units/human-iceage/Healer.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Healer.png"
				sound=staff.wav
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Healer.png"
				sound={SOUND_LIST:MISS}
			[/frame]
		[/else]
		[frame]
			begin=100
			end=150
			image="units/human-iceage/Healer.png"
		[/frame]
		[frame]
			begin=150
			end=200
			image="units/human-iceage/Healer.png"
		[/frame]
	[/attack_anim]
	[female]
		name= _ "female^Healer"
		gender=female
		image="units/human-iceage/Healer+female.png"
		profile="portraits/Healer.png"
		die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
		{DEFENSE_ANIM "units/human-iceage/Healer+female.png" "units/human-iceage/Healer+female.png" {SOUND_LIST:HUMAN_FEMALE_HIT} }
