#textdomain wesnoth-The_Ice_Age

[unit_type]
    id=Bard
    name= _ "Bard"
    race=iceage
    gender=male,female
    image="units/human-iceage/Druid.png"
    profile="portraits/humans/mage-silver.png"
    hitpoints=60
    movement_type=iceagefoot
    movement=6
    experience=150
    level=3
    alignment=neutral
    advances_to=null
    {AMLA_DEFAULT}
    cost=59
    usage=healer
    description= _ "Bards are the keepers of lore among Tir Liath. With an almost magical knack for healing as well as the ancient lore, bards often travel the countryside with a retinue of students. The curses they fling at enemies are said to carry unfathomable power. On top of all this, it is said that bards can disappear in an instant, going to a far-off land in a time of need."+_"SPECIAL_NOTE^ Bards are well-attuned to their magical natures and are highly resistant to non-physical damage."
    die_sound={SOUND_LIST:HUMAN_DIE}
    [resistance]
        fire=50
        cold=50
    [/resistance]
    [abilities]
        {ABILITY_TELEPORT} 
        {ABILITY_CURES}
    [/abilities]
    {DEFENSE_ANIM "units/human-iceage/Druid.png" "units/human-iceage/Druid.png" {SOUND_LIST:HUMAN_OLD_HIT} }
    [attack]
        name=staff
        description=_"sickle"
        icon=attacks/sickle.png
        type=blade
        range=melee
        damage=9
        number=2
    [/attack]
    [attack]
        name=dart
        description=_"dart"
        icon=attacks/javelin-orcish.png
        type=pierce
        range=ranged
        [specials]
            {WEAPON_SPECIAL_POISON}
        [/specials]
        damage=9
        number=4
    [/attack]
    [attack]
        name=missile
        description=_"Satire"
        type=arcane
        range=ranged
        icon=attacks/curse.png
        [specials]
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
        damage=10
        number=4
    [/attack]
    [attack_anim]
        [filter_attack]
            name=dart
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/dart-n.png"
            image_diagonal="projectiles/dart-ne.png"
        [/missile_frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=missile
        [/filter_attack]

        offset=0

        {MAGIC_MISSILE 14 -23}
        {MAGIC_MISSILE_STAFF_FLARE -750 600 14 -23}

        [frame]
            begin=-800
            end=-700
            image="units/human-iceage/Druid.png"
        [/frame]
        [frame]
            begin=-700
            end=-350
            image="units/human-iceage/Druid.png"
        [/frame]
        [if]
            hits=no
            [frame]
                begin=-350
                end=-100
                image="units/human-iceage/Druid.png"
                sound=magic-missile-1-miss.ogg,magic-missile-2-miss.ogg,magic-missile-3-miss.ogg
            [/frame]
        [/if]
        [else]
            hits=yes
            [frame]
                begin=-350
                end=-100
                image="units/human-iceage/Druid.png"
                sound=magic-missile-1.ogg,magic-missile-2.ogg,magic-missile-3.ogg
            [/frame]
        [/else]
        [frame]
            begin=-100
            end=100
            image="units/human-iceage/Druid.png"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]
        [frame]
            begin=-250
            end=-200
            image="units/human-iceage/Druid.png"
        [/frame]
        [frame]
            begin=-200
            end=-100
            image="units/human-iceage/Druid.png"
        [/frame]
        [if]
            hits=yes
