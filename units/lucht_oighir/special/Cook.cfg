#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=IACook
	name= _ "Cook"
	# wmllint: general spelling spearmen
	race=iceage
	image="units/human-iceage/cook.png"
	profile="portraits/humans/spearman.webp"
	hitpoints=33
	movement_type=lighticefoot
	movement=7
	experience=42
	level=1
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=16
	usage=fighter
	description= _ "One of the most important skills to the Lucht Oighir was the ability to handle a spear on the hunt. Though they typically aren't used for fighting, they can be ready if need be at a moment's notice. They can move quickly and silently through the hunting grounds they hold dear."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/cook.png" "units/human-iceage/cook.png" {SOUND_LIST:HUMAN_HIT} }
	[resistance]
		blade=90
		pierce=70
		impact=100
		fire=100
		cold=50
		arcane=80
	[/resistance]
	[attack]
		name=spear
		description=_"Hunting Spear"
		type=pierce
		range=melee
		damage=10
		number=2
		icon=attacks/spear-orcish.png
		[specials]
			{WEAPON_SPECIAL_FIRSTSTRIKE}
			{WEAPON_SPECIAL_MARKSMAN}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		direction=s
		[frame]
			begin=-200
			end=-150
			image="units/human-iceage/cook.png"
		[/frame]
		[frame]
			begin=-150
			end=-50
			image="units/human-iceage/cook.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-50
				end=100
				image="units/human-iceage/cook.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-50
				end=100
				image="units/human-iceage/cook.png"
				sound=spear-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=100
			end=150
			image="units/human-iceage/cook.png"
		[/frame]
	[/attack_anim]
