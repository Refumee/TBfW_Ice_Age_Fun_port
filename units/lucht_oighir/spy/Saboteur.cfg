#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Saboteur
	name= _ "Saboteur"
	race=iceage
	gender=male
	image="units/spy/saboteur.png"
	profile=portraits/saboteur.png
	hitpoints=45
	movement_type=lighticefoot
	movement=6
	experience=80
	level=2
	alignment=chaotic
	advances_to=Secret_Agent
	cost=27
	usage=fighter
	description= _ "Saboteurs have more skill and maturiy than their younger counterparts. Most notable is the fact that they no longer dye their hair blue, allowing them more diverse hiding places on their various missions."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/spy/saboteur.png" "units/spy/saboteur.png" {SOUND_LIST:HUMAN_HIT} }
	[abilities]
		{ABILITY_SKIRMISHER}
		{ABILITY_AMBUSH}
		{ABILITY_CONCEALMENT}
	[/abilities]
	[attack]
		name=dagger
		description=_"dagger"
		icon=attacks/dagger-human.png
		type=blade
		range=melee
		damage=6
		number=3
		[specials]
			{WEAPON_SPECIAL_BACKSTAB}
		[/specials]
	[/attack]
	[attack]
		name=knife
		description=_"knife"
		icon=attacks/dagger-thrown-human.png
		type=blade
		range=ranged
		damage=5
		number=3
	[/attack]
	[attack_anim]
		[filter_attack]
			name=knife
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/dagger-n.png"
			image_diagonal="projectiles/dagger-ne.png"
		[/missile_frame]
		[if]
			hits=yes
			[frame]
				begin=-200
				end=-100
				image="units/spy/saboteur.png"
				sound=throwing-knife.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-200
				end=-100
				image="units/spy/saboteur.png"
				sound=throwing-knife-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=-100
			end=50
			image="units/spy/saboteur.png"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=dagger
		[/filter_attack]
		[frame]
			begin=-200
			end=-150
			image="units/spy/saboteur.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-150
				end=100
				image="units/spy/saboteur.png"
				sound=dagger-swish.wav
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-150
				end=100
				image="units/spy/saboteur.png"
				sound={SOUND_LIST:MISS}
			[/frame]
		[/else]
		[frame]
			begin=100
			end=200
			image="units/spy/saboteur.png"
		[/frame]
	[/attack_anim]
   [/unit_type]
