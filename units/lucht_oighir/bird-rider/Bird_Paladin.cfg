#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Bird_Paladin
	name= _ "Bird Fianna"
	race=iceage
	image="units/bird/bird-paladin.png"
	profile="portraits/humans/grand-knight.png"
	hitpoints=78
	movement_type=iceagefoot
	movement=7
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	undead_variation=mounted
	cost=58
	usage=fighter
	description= _ "Those who reach the rank of Bird Paladin are truly at the epitome of their skill. They carry a large shield which they use to bash on their opponents in between blows."
	die_sound=horse-die.ogg
	[movement_costs]
		cave=3
		forest=1
	[/movement_costs]
	[defense]
		cave=70
		forest=50
	[/defense]

	[attack]
		name=shield
		description=_"shield bash"
		icon=icons/shield_wooden.png
		type=impact
		[specials]
			{WEAPON_SPECIAL_SLOW}
		[/specials]
		range=melee
		damage=7
		number=3
	[/attack]
	[attack]
		name=lance
		description=_"lance"
		type=pierce
		[specials]
			{WEAPON_SPECIAL_CHARGE}
		[/specials]
		range=melee
		damage=19
		number=2
	[/attack]
	[movement_anim]
		[frame]
			begin=0
			end=150
			image="units/bird/bird-paladin.png"
		[/frame]
	[/movement_anim]
	{DEFENSE_ANIM "units/bird/bird-paladin.png" "units/bird/bird-paladin.png" {SOUND_LIST:HORSE_HIT} }
	
	[attack_anim]
		[filter_attack]
			name=lance
		[/filter_attack]
		
		start_time=-400
		sound_start_time=-400
		offset=0.0~0.3:300,0.3~0.45:210,0.45~0.0:420
		
		[sound_frame]
			sound=horse-canter.wav
		[/sound_frame]
		
		[frame]
			image="units/bird/bird-paladin.png"
		[/frame]
		
		{SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
	[/attack_anim]
	
	[attack_anim]
		[filter_attack]
			name=shield
		[/filter_attack]
		
		start_time=-400
		sound_start_time=-400
		offset=0.0~0.3:300,0.3~0.45:210,0.45~0.0:420
		
		[sound_frame]
			sound=horse-canter.wav
		[/sound_frame]
		[frame]
			image="units/bird/bird-paladin.png"
		[/frame]
		{SOUND:HIT_AND_MISS mace.ogg mace-miss.ogg -100}
	[/attack_anim]
[/unit_type]
