#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Bird_Mount
	name= _ "Bird Mount"
	race=iceage
	image="units/bird/bird-mount.png"
	profile="portraits/humans/horseman.png"
	hitpoints=38
	movement_type=iceagefoot
	movement=8
	experience=44
	level=1
	alignment=neutral
	advances_to=Bird_Knight,Bird_Rider
	undead_variation=mounted
	cost=23
	usage=fighter
	description= _ "The elephant birds are wild creatures, able to kill large beasts with a single kick. However, some people can develop a bond with the giant ostrich-like birds. They carry a spear to impale their foes."
	die_sound=horse-die.ogg
	[movement_costs]
		cave=3
		forest=1
	[/movement_costs]
	[defense]
		cave=70
		forest=50
	[/defense]
	[attack]
		name=spear
		description=_"spear"
		type=pierce
		[specials]
			{WEAPON_SPECIAL_CHARGE}
		[/specials]
		range=melee
		damage=9
		number=2
	[/attack]
	{DEFENSE_ANIM "units/bird/bird-mount.png" "units/bird/bird-mount.png" {SOUND_LIST:HORSE_HIT} }
	
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		
		start_time=-400
		sound_start_time=-400
		offset=0.0~0.3:300,0.3~0.45:210,0.45~0.0:420
		
		[sound_frame]
			sound=horse-canter.wav
		[/sound_frame]
		
		[frame]
			image="units/bird/bird-mount.png"
		[/frame]
		
		{SOUND:HIT_AND_MISS spear.ogg {SOUND_LIST:MISS} -100}
	[/attack_anim]

[/unit_type]
