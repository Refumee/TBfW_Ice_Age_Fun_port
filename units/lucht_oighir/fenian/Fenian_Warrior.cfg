#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Guardsman
    name= _ "Fenian Warrior"
    race=iceage
    image="units/fenian/fenian-warrior.png"
    profile="portraits/humans/thug.png"
    hitpoints=50
    movement_type=iceagefoot
    movement=5
    level=2
    alignment=neutral
    experience=70
    advances_to=Captain
    cost=23
    usage=fighter
    description= _ "Those fighters that choose the club as their primary weapon learn to harness the power of brute force. Sometimes using various dyes to tattoo themselves blue, they relish the heat of battle in a way that sometimes frightens their enemies."
    die_sound={SOUND_LIST:HUMAN_DIE}
    {DEFENSE_ANIM "units/fenian/fenian-warrior.png" "units/fenian/fenian-warrior.png" {SOUND_LIST:HUMAN_HIT} }
    [attack]
        name=mace-spiked
        description=_"Shillelagh"
        type=impact
        range=melee
        damage=8
        number=4
    [/attack]
    [attack_anim]
        [filter_attack]
            name=mace-spiked
        [/filter_attack]
        offset=0.0~0.2,0.2~0.6,0.6~0.4,0.4~0.0
        start_time=-500
       [frame]
            begin=-200
            end=-150
            image="units/fenian/fenian-warrior.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-150
                end=100
                image="units/fenian/fenian-warrior.png"
                sound=staff.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-150
                end=100
                image="units/fenian/fenian-warrior.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            begin=100
            end=150
            image="units/fenian/fenian-warrior.png"
        [/frame]
    [/attack_anim]
[/unit_type]
