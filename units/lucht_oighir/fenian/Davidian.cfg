#textdomain wesnoth-The_Ice_Age

[unit_type]
    id=Davidian
    name= _ "Davidian"
    race=iceage
    gender=male
    image="units/fenian/david.png"
    profile="portraits/humans/outlaw.png"
    hitpoints=62
    movement_type=lighticefoot
    movement=7
    experience=150
    level=3
    alignment=neutral
    advances_to=null
    {AMLA_DEFAULT}
    cost=56
    usage=mixed fighter
    description= _ "It is said that this legendary caste was founded by a young king who slew a giant with a stone from his sling. Those admitted into the ranks of fenian/davidians are ultimate masters of this ancient weapon."
    die_sound={SOUND_LIST:HUMAN_DIE}
    {DEFENSE_ANIM "units/fenian/david.png" "units/fenian/david.png" {SOUND_LIST:HUMAN_HIT} }
    [attack]
        name=mace-spiked
        description= _ "mace"
        type=impact
        range=melee
        damage=11
        number=2
        icon=attacks/mace.png
    [/attack]
    [attack]
        name=sling
        description= _ "sling"
        type=impact
        range=ranged
        [specials]
            {WEAPON_SPECIAL_MARKSMAN}
        [/specials]
        damage=7
        number=5
        icon=attacks/sling.png
    [/attack]
    [attack]
        name=tooth
        description= _ "Stray Tooth"
        type=blade
        range=ranged
        damage=6
        number=8
        [specials]
            {WEAPON_SPECIAL_SWARM}
        [/specials]
        icon=attacks/pike.png
    [/attack]  
    [attack_anim]
        [filter_attack]
            name=tooth
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/dagger-n.png"
            image_diagonal="projectiles/dagger-ne.png"
        [/missile_frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=sling
        [/filter_attack]
        offset=0.0
        [if]
            hits=yes
            {MISSILE_FRAME_STONE_HIT 5 -6}
            [frame]
                begin=-400
                end=-150
                image="units/fenian/david.png"
                sound=sling.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            {MISSILE_FRAME_STONE_MISS 5 -6}
            [frame]
                begin=-400
                end=-150
                image="units/fenian/david.png"
                sound=sling-miss.ogg
            [/frame]
        [/else]
        [frame]
            begin=-150
            end=50
            image="units/fenian/david.png"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=mace-spiked
        [/filter_attack]
        [frame]
            begin=-200
            end=-100
            image="units/fenian/david.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-100
                end=50
                image="units/fenian/david.png"
                sound=mace.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-100
                end=50
                image="units/fenian/david.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            begin=50
            end=150
            image="units/fenian/david.png"
        [/frame]
    [/attack_anim]
   [/unit_type]
