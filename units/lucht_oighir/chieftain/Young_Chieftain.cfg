#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Young_Cheiftan
    name= _ "Young Chieftain"
    race=iceage
    image="units/chieftain/young_chieftain.png"
    profile=portraits/humans/trapper.png
    ellipse="misc/ellipse"
    hitpoints=30
    movement_type=iceagefoot
    movement=6
    experience=29
    level=1
    alignment=neutral
    advances_to=Chieftan
    undead_variation=archer
    cost=14
    usage=archer
    description= _ "A young chieftan of an ice age tribe..."
    die_sound={SOUND_LIST:HUMAN_DIE}
    {DEFENSE_ANIM_RANGE "units/chieftain/young_chieftain.pngg" "units/chieftain/young_chieftain.png" {SOUND_LIST:HUMAN_HIT} melee }
    {DEFENSE_ANIM_RANGE "units/chieftain/young_chieftain.png" "units/chieftain/young_chieftain.png" {SOUND_LIST:HUMAN_HIT} ranged }
    [movement_costs]
        swamp_water=2
    [/movement_costs]
    [defense]
        forest=40
        swamp_water=50
    [/defense]
    [attack]
        name=dagger
        description=_"dagger"
        icon=attacks/dagger-human.png
        type=blade
        range=melee
        damage=5
        number=2
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        type=pierce
        range=ranged
        damage=5
        number=4
    [/attack]
    [attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        [missile_frame]
            begin=-150
            end=0
            image="projectiles/missile-n.png"
            image_diagonal="projectiles/missile-ne.png"
        [/missile_frame]
        [if]
            hits=yes
            [frame]
                begin=-400
                end=-250
                image="units/chieftain/young_chieftain.png"
                sound=bow.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-400
                end=-250
                image="units/chieftain/young_chieftain.png"
                sound=bow-miss.ogg
            [/frame]
        [/else]
        [frame]
            begin=-250
            end=-100
            image="units/chieftain/young_chieftain.png"
        [/frame]
        [frame]
            begin=-100
            end=0
            image="units/chieftain/young_chieftain.png"
        [/frame]
        [frame]
            begin=0
            end=100
            image="units/chieftain/young_chieftain.png"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=dagger
        [/filter_attack]
        [frame]
            begin=-250
            end=-150
            image="units/chieftain/young_chieftain.png"
        [/frame]
        [if]
            hits=yes
            [frame]
                begin=-150
                end=50
                image="units/chieftain/young_chieftain.png"
                sound=dagger-swish.wav
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-150
                end=50
                image="units/chieftain/young_chieftain.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            begin=50
            end=150
            image="units/chieftain/young_chieftain.png"
        [/frame]
    [/attack_anim]
[/unit_type]
