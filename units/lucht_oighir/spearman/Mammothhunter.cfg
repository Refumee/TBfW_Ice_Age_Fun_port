#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Mammoth_Hunter
	name= _ "Mammoth Hunter"
	race=iceage
	image="units/human-iceage/Mammothhunter.png"
	profile="portraits/humans/javelineer.webp"
	hitpoints=70
	movement_type=iceagefoot
	movement=6
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=48
	usage=mixed fighter
	description= _ "Only the greatest javelineers survive long enough to earn the title of Mammoth Hunter. These legendary warriors have faced the giant beasts of the frozen plains and lived to tell the tale, bringing down creatures many men would flee from in terror. Their immense strength and deadly accuracy allow them to hurl heavy spears with crushing force, while their fearlessness inspires the warriors of their clan in even the fiercest battles."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Mammothhunter.png" "units/human-iceage/Mammothhunter.png" {SOUND_LIST:HUMAN_HIT} }
	[abilities]
		{ABILITY_SKIRMISHER}
	[/abilities]
	[attack]
		name=spear
		description=_"Hunting Spear"
		icon=attacks/spear-orcish.png
		type=pierce
		range=melee
		damage=11
		number=3
		[specials]
			{WEAPON_SPECIAL_FIRSTSTRIKE}	
		[/specials]
	[/attack]
	[attack]
		name=javelin
		description=_"Harpoon"
		icon=attacks/javelin-orcish.png
		type=pierce
		range=ranged
		damage=14
		number=3
	[/attack]
	[attack_anim]
		[filter_attack]
			name=javelin
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/spear-n.png"
			image_diagonal="projectiles/spear-ne.png"
		[/missile_frame]
		[frame]
			begin=-250
			end=-150
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
		[frame]
			begin=-150
			end=-50
			image="units/human-iceage/Mammothhunter.png"
			sound={SOUND_LIST:THROW}
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Mammothhunter.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Mammothhunter.png"
			[/frame]
		[/else]
		[frame]
			begin=50
			end=100
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		[frame]
			begin=-300
			end=-200
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
		[frame]
			begin=-200
			end=-100
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Mammothhunter.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Mammothhunter.png"
				sound=spear-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=100
			end=175
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
		[frame]
			begin=175
			end=250
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
		[frame]
			begin=250
			end=300
			image="units/human-iceage/Mammothhunter.png"
		[/frame]
	[/attack_anim]
[/unit_type]