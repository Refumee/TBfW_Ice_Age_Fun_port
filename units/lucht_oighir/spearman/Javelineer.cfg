#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=IAJavelineer
	name= _ "Javelineer"
	race=iceage
	image="units/human-iceage/Javelineer.png"
	profile="portraits/humans/spearman-2.webp"
	hitpoints=48
	movement_type=iceagefoot
	movement=5
	experience=85
	level=2
	alignment=neutral
	advances_to=Mammoth_Hunter
	{AMLA_DEFAULT}
	cost=25
	usage=mixed fighter
	description= _ "Javelineers are seasoned hunters and warriors of the northern clans, trained to strike swiftly with heavy throwing spears before the enemy can draw near. Wearing little more than hardened leather, bronze ornaments, and their traditional tartans, they rely on endurance and skill rather than heavy armor. In battle, their accurate volleys can break an advancing charge and earn them a respected place beside the tribal chieftains."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Javelineer.png" "units/human-iceage/Javelineer.png" {SOUND_LIST:HUMAN_HIT} }
	[attack]
		name=spear
		description=_"Hunting Spear"
		icon=attacks/spear-orcish.png
		type=pierce
		range=melee
		damage=8
		number=3
		[specials]
			{WEAPON_SPECIAL_FIRSTSTRIKE}
		[/specials]
	[/attack]
	[attack]
		name=javelin
		description=_"Harpoon"
		icon=attacks/javelin-orcish.png
		type=pierce
		range=ranged
		damage=14
		number=2
	[/attack]
	[attack_anim]
		[filter_attack]
			name=javelin
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/spear-n.png"
			image_diagonal="projectiles/spear-ne.png"
		[/missile_frame]
		[frame]
			begin=-250
			end=-150
			image="units/human-iceage/Javelineer.png"
		[/frame]
		[frame]
			begin=-150
			end=-50
			image="units/human-iceage/Javelineer.png"
			sound={SOUND_LIST:THROW}
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Javelineer.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Javelineer.png"
			[/frame]
		[/else]
		[frame]
			begin=50
			end=100
			image="units/human-iceage/Javelineer.png"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		[frame]
			begin=-300
			end=-200
			image="units/human-iceage/Javelineer.png"
		[/frame]
		[frame]
			begin=-200
			end=-100
			image="units/human-iceage/Javelineer.png"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Javelineer.png"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Javelineer.png"
				sound=spear-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=100
			end=175
			image="units/human-iceage/Javelineer.png"
		[/frame]
		[frame]
			begin=175
			end=250
			image="units/human-iceage/Javelineer.png"
		[/frame]
		[frame]
			begin=250
			end=300
			image="units/human-iceage/Javelineer.png"
		[/frame]
	[/attack_anim]
[/unit_type]

