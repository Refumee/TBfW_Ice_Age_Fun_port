#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Deerstalker
	name= _ "Shadow Deerstalker"
	race=shadow
	image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
	profile="portraits/humans/javelineer.webp~GS()~CS(-66,-66,-66)~O(0.3)"
	hitpoints=75
	movement_type=shadowfoot
	movement=6
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=51
	usage=fighter
	description= _ "The cold north is hard on the fingers, the cold robs the fingers of their dexterity and makes a bow too hard to use. The Northern Rangers throw spears and use them on defense, for they do not require nimble fingers, and they have the momentum to pierce the thick, hairy hides of a northern beast."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Deerstalker.png~GS()~CS(-50,+100,-50)" "units/human-iceage/Deerstalker.png~GS()~CS(-50,+100,-50)" {SOUND_LIST:HUMAN_HIT} }

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/human-iceage/Deerstalker.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]


	[abilities]
		{ABILITY_AMBUSH}
	[/abilities]
	[defense]
		forest=40
	[/defense]
	[attack]
		name=spear
		description=_"Hunting Spear"
		icon=attacks/spear-orcish.png~GS()~O(0.4)
		type=pierce
		range=melee
		damage=15
		number=3
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Hunter)}
		[/specials]
	[/attack]
	[attack]
		name=sword
		description=_"Large Hunting Knife"
		icon=attacks/sword-human-short.png~GS()~O(0.4)
		type=blade
		range=melee
		damage=8
		number=5
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Hunter)}
		[/specials]
	[/attack]
	[attack]
		name=javelin
		description=_"Harpoon"
		icon=attacks/javelin-orcish.png~GS()~O(0.4)
		type=pierce
		range=ranged
		damage=12
		number=2
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Hunter)}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=javelin
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/spear-n.png~GS()~CS(-66,-66,-66)"
			image_diagonal="projectiles/spear-ne.png~GS()~CS(-66,-66,-66)"
		[/missile_frame]
		[frame]
			begin=-250
			end=-150
			image="units/human-iceage/Deerstalker.png~GS()~CS(+100,-66,+100)"
		[/frame]
		[frame]
			begin=-150
			end=-50
			image="units/human-iceage/Deerstalker.png~GS()~CS(+100,-66,+100)"
			sound={SOUND_LIST:THROW}
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Deerstalker.png~GS()~CS(+100,-66,+100)"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-50
				end=50
				image="units/human-iceage/Deerstalker.png~GS()~CS(+100,-66,+100)"
			[/frame]
		[/else]
		[frame]
			begin=50
			end=100
			image="units/human-iceage/Deerstalker.png~GS()~CS(+100,-66,+100)"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=spear
		[/filter_attack]
		[frame]
			begin=-300
			end=-200
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		[frame]
			begin=-200
			end=-100
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=100
				image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
				sound=spear-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=100
			end=175
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		[frame]
			begin=175
			end=250
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		[frame]
			begin=250
			end=300
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=sword
		[/filter_attack]
		[frame]
			begin=-250
			end=-150
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		[frame]
			begin=-150
			end=100
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -100}
		[frame]
			begin=50
			end=150
			image="units/human-iceage/Deerstalker.png~GS()~CS(+120,-66,-66)"
		[/frame]
	[/attack_anim]
[/unit_type]