	[attack]
		name=staff
		description=_"staff"
		icon=attacks/staff-magic.png~GS()~O(0.4)
		type=impact
		range=melee
		damage=4
		number=3
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=missile
		description=_"missile"
		icon=attacks/magic-missile.png~GS()~O(0.4)
		type=cold
		range=ranged
		[specials]
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=10
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=missile
		[/filter_attack]

		offset=0

		{MAGIC_MISSILE 11 -20}
		{MAGIC_MISSILE_STAFF_FLARE -750 600 11 -20}

		[frame]
			begin=-800
			end=-700
			image="units/human-iceage/Hud.png~GS()~CS(60,-66,60)"
		[/frame]
		[frame]
			begin=-700
			end=-350
			image="units/human-iceage/Hud.png~GS()~CS(60,-66,60)"
		[/frame]
		[if]
			hits=no
			[frame]
				begin=-350
				end=-100
				image="units/human-iceage/Hud.png~GS()~CS(60,-66,60)"
				sound=magic-missile-1-miss.ogg,magic-missile-2-miss.ogg,magic-missile-3-miss.ogg
			[/frame]
		[/if]
		[else]
			hits=yes
			[frame]
				begin=-350
				end=-100
				image="units/human-iceage/Hud.png~GS()~CS(60,-66,60)"
