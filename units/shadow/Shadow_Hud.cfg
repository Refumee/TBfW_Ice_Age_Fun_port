#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Hud
	name= _ "Shadow Hud"
	race=shadow
	gender=male,female
	image="units/human-iceage/Hud.png~GS()~CS(-66,-66,-66)"
	profile="portraits/humans/mage-white.png~GS()~CS(-66,-66,-66)~O(0.3)"
