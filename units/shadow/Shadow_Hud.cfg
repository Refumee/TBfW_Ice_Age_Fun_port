	movement_type=shadowfoot
	movement=5
	experience=110
	level=2
	alignment=neutral
	advances_to=Shadow Phantarch
	cost=40
	usage=mixed fighter
	description= _ "Some healers, as they study the art of healing, decide to focus only on healing themselves, rather than those around them. Though this has some drawbacks, the benefits associated with this skill should not be underestimated."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Hud.png~GS()~CS(-66,60,-66)" "units/human-iceage/Hud.png~GS()~CS(-66,60,-66)" {SOUND_LIST:HUMAN_OLD_HIT} }
