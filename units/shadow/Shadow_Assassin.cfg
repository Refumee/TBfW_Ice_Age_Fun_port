#textdomain wesnoth-units
[unit_type]
	id=Shadow Assassin
	name= _ "Shadow Assassin"
	race=shadow
	image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
	profile="portraits/orcs/assassin.webp~GS()~CS(-50,-50,-50)~O(0.3)"
	hitpoints=30
	movement_type=shadowfoot
	movement=6
	experience=34
	level=1
	alignment=neutral
	advances_to=Shadow Slayer
	cost=17
	usage=mixed fighter
	description= _ "While many orcs prefer brute force as their modus operandi, the highly practical nature of their warfare promotes cutthroat tactics that are usually frowned on by other factions. Poison is one of the mainstays of orcish strategy, employed liberally to soften tough opponents on the battlefield and cripple enemy forces without risking a direct assault. The same weapon is readily turned to espionage and assassination, a commonplace occurrence between feuding orcish clans or even within a single clan itself."
	die_sound={SOUND_LIST:ORC_SMALL_DIE}
	{DEFENSE_ANIM_RANGE "units/orcs/assassin-defend-2.png~GS()~CS(-50,60,-50)" "units/orcs/assassin-defend-1.png~GS()~CS(-50,60,-50)" {SOUND_LIST:ORC_SMALL_HIT} melee }
	{DEFENSE_ANIM_RANGE "units/orcs/assassin-defend.png~GS()~CS(-50,60,-50)" "units/orcs/assassin.png~GS()~CS(-50,60,-50)" {SOUND_LIST:ORC_SMALL_HIT} ranged }

	[abilities]
		{ABILITY_SKIRMISHER}
	[/abilities]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/orcs/assassin.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=dagger
		description=_"dagger"
		icon=attacks/dagger-orcish.png~GS()~O(0.4)
		type=blade
		range=melee
		damage=4
		number=3
		[specials]
			{WEAPON_SPECIAL_BACKSTAB}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=throwing knives
		description=_"throwing knives"
		icon=attacks/dagger-thrown-poison-orcish.png~GS()~O(0.4)
		type=blade
		range=ranged
		damage=8
		number=1
		[specials]
			{WEAPON_SPECIAL_MARKSMAN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[death]
		start_time=0
		[frame]
			image="units/orcs/assassin-die-[1~10].png~GS()~CS(+120,+120,-50):[120,100*4,80*2,100*3]"
		[/frame]
	[/death]
	[standing_anim]
		start_time=0
		{WOUNDED_UNIT ()}
		[if]
			direction=s,se,sw
			[frame]
				image="units/orcs/assassin-heaving-[1~4,3,2].png~GS()~CS(-50,-50,-50):[400*6]"
			[/frame]
		[/if]
		[else]
			direction=n,ne,nw
			# need to draw these still
			[frame]
				image="units/orcs/assassin-heaving-[1~4,3,2].png~GS()~CS(-50,-50,-50):[400*6]"
				# image="units/orcs/assassin-heave-ne-[1~5,4,3,2].png~GS()~CS(-50,-50,-50):[200*2,300,200*2,200*3]"
			[/frame]
		[/else]
	[/standing_anim]
	[standing_anim]
		start_time=0
		[if]
			direction=s,se,sw
			[frame]
				image="units/orcs/assassin.png~GS()~CS(-50,-50,-50):150"
			[/frame]
		[/if]
		[else]
			direction=n,ne,nw
			# need to draw these still
			[frame]
				image="units/orcs/assassin.png~GS()~CS(-50,-50,-50):150"
				# image="units/orcs/assassin-ne.png~GS()~CS(-50,-50,-50):150
			[/frame]
		[/else]
	[/standing_anim]
	[standing_anim]
		start_time=0
		{STANDING_COMBAT_FILTER}
		[if]
			direction=s,se,sw
			[frame]
				image=units/orcs/assassin-bob-lo.png~GS()~CS(-50,-50,-50):350,units/orcs/assassin.png~GS()~CS(-50,-50,-50):350
			[/frame]
			[frame]
				image="units/orcs/assassin-bob-[hi,hi2,hi].png~GS()~CS(-50,-50,-50):[350*3]"
			[/frame]
			[frame]
				image=units/orcs/assassin.png~GS()~CS(-50,-50,-50):350
			[/frame]
		[/if]
		[else]
			direction=n,ne,nw
			# need to draw these still
			[frame]
				image=units/orcs/assassin-bob-lo.png~GS()~CS(-50,-50,-50):350,units/orcs/assassin.png~GS()~CS(-50,-50,-50):350
			[/frame]
			[frame]
				image="units/orcs/assassin-bob-[hi,hi2,hi].png~GS()~CS(-50,-50,-50):[350*3]"
			[/frame]
			[frame]
				image=units/orcs/assassin.png~GS()~CS(-50,-50,-50):350
			[/frame]
		[/else]
	[/standing_anim]
	[idle_anim]
		{STANDARD_IDLE_FILTER}
		start_time=0
		[frame]
			image="units/orcs/assassin-idle-[1~8,7,8,3,2,9].png~GS()~CS(-50,-50,-50):100"
		[/frame]
	[/idle_anim]
	[attack_anim]
		[filter_attack]
			name=throwing knives
		[/filter_attack]
		missile_start_time=-150
		[missile_frame]
			duration=150
			image="projectiles/dagger-n.png~GS()~CS(-50,-50,-50)"
			image_diagonal="projectiles/dagger-ne.png~GS()~CS(-50,-50,-50)"
		[/missile_frame]
		start_time=-250
		[frame]
			image="units/orcs/assassin-ranged[1,2].png~GS()~CS(60,-50,60):100"
		[/frame]
		{SOUND:HIT_AND_MISS throwing-knife.ogg throwing-knife-miss.ogg -150}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=dagger
		[/filter_attack]
		start_time=-320
		[frame]
			image="units/orcs/assassin-attack-[1~6].png~GS()~CS(80,-50,-50):[80*4,100*2]"
		[/frame]
		{SOUND:HIT_AND_MISS dagger-swish.wav {SOUND_LIST:MISS} -100}
	[/attack_anim]
[/unit_type]
