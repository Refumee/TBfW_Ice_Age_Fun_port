#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Fighter
	name= _ "Shadow Fighter"
	race=shadow
	image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
	profile="portraits/elves/fighter.webp~GS()~CS(-66,-66,-66)~O(0.3)"
	hitpoints=32
	movement_type=shadowfoot
	movement=5
	experience=38
	level=1
	alignment=neutral
	advances_to=Shadow Captain,Shadow Hero
	cost=16
	usage=fighter
	description= _ "The Shadow Fighter is a shadowy creature who resembles a elvish fighter."
	die_sound={SOUND_LIST:ELF_HIT}

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/elves-wood/fighter/fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=sword
		description=_"sword"
		icon=attacks/sword-elven.png~GS()~O(0.4)
		type=blade
		range=melee
		damage=4
		number=4
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=bow
		description=_"bow"
		icon=attacks/bow-elven.png~GS()~O(0.4)
		type=pierce
		range=ranged
		damage=3
		number=3
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	{DEFENSE_ANIM_RANGE "units/elves-wood/fighter/fighter-defend2.png~GS()~CS(-66,+100,-66)" "units/elves-wood/fighter/fighter-defend.png~GS()~CS(-66,+100,-66)" {SOUND_LIST:ELF_HIT} melee }
	{DEFENSE_ANIM_RANGE "units/elves-wood/fighter/fighter-bow-defend2.png~GS()~CS(-66,+100,-66)" "units/elves-wood/fighter/fighter-bow-defend1.png~GS()~CS(-66,+100,-66)" {SOUND_LIST:ELF_HIT} ranged }
	[movement_anim]
		start_time=0
		[frame]
			image="units/elves-wood/fighter/fighter-se-run[1~10].png~GS()~CS(-66,-66,-66):60"
		[/frame]
	[/movement_anim]
	[attack_anim]
		[filter_attack]
			name=bow
		[/filter_attack]
		missile_start_time=-150
		[missile_frame]
			duration=150
			image="projectiles/missile-n.png~GS()~CS(-66,-66,-66)"
			image_diagonal="projectiles/missile-ne.png~GS()~CS(-66,-66,-66)"
		[/missile_frame]
		start_time=-445
		[frame]
			image="units/elves-wood/fighter/fighter-bow.png~GS()~CS(+100,-66,+100):65"
		[/frame]
		{SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
		[frame]
			image="units/elves-wood/fighter/fighter-bow-attack[1~4].png~GS()~CS(+100,-66,+100):[75*2,100,130]"
		[/frame]
		[frame]
			image="units/elves-wood/fighter/fighter-bow.png~GS()~CS(+100,-66,+100):65"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=sword
		[/filter_attack]
		start_time=-275
		offset=0.0:125,0.0~0.6:150,0.6~0.0:180
		[frame]
			image="units/elves-wood/fighter/fighter-melee-1.png~GS()~CS(+120,-66,-66):155"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
		[frame]
			image="units/elves-wood/fighter/fighter-melee-[2,3,4].png~GS()~CS(+120,-66,-66):[80,80,125]"
		[/frame]
		[frame]
			image="units/elves-wood/fighter/fighter.png~GS()~CS(+120,-66,-66):15"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=sword
		[/filter_attack]
		start_time=-275
		offset=0.0:125,0.0~0.6:150,0.6~0.0:180
		[frame]
			image="units/elves-wood/fighter/fighter-melee-[1~4].png~GS()~CS(+120,-66,-66):[155,80,80,125]"
		[/frame]
		[frame]
			image="units/elves-wood/fighter/fighter.png~GS()~CS(+120,-66,-66):15"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=sword
		[/filter_attack]
		# make it less common than the previous one
		frequency=2
		start_time=-345
		offset=0.0:195,0.0~0.6:150,0.6~0.0:180
		[frame]
			image="units/elves-wood/fighter/fighter-melee-[1~5]b.png~GS()~CS(+120,-66,-66):[90,90,125,80,125]"
		[/frame]
		[frame]
			image="units/elves-wood/fighter/fighter.png~GS()~CS(+120,-66,-66):15"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
	[/attack_anim]
[/unit_type]
