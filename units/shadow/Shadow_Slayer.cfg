#textdomain wesnoth-units
[unit_type]
	id=Shadow Slayer
	name= _ "Shadow Slayer"
	race=shadow
	image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
	profile="portraits/orcs/slayer.webp~GS()~CS(-50,-50,-50)~O(0.3)"
	hitpoints=43
	movement_type=shadowfoot
	movement=6
	experience=62
	level=2
	alignment=neutral
	advances_to=Shadow Nightblade
	cost=21
	usage=mixed fighter
	description= _ "Skilled orcish assassins are surprisingly nimble covert troops who achieve great agility by forgoing the heavy armor of their brethren. Their weapon of choice, poison, is often criticized as a vicious tool unsuited for the established customs of typical warfare. Most orcs, however, recognize no such laws of combat and seek to attain victory by any means necessary. Defeat, no matter the reason, is usually treated as the greatest dishonor possible. The brutal nature of the total war that orcs engage in is precisely what gives rise to these ruthless soldiers, rightly dubbed ‘Slayers’ by their enemies."
	die_sound={SOUND_LIST:ORC_DIE}
	{DEFENSE_ANIM "units/orcs/slayer-defend.png~GS()~CS(-50,+100,-50)" "units/orcs/slayer.png~GS()~CS(-50,+100,-50)" {SOUND_LIST:ORC_HIT} }

	[abilities]
		{ABILITY_NIGHTSTALK}
		{ABILITY_SKIRMISHER}
	[/abilities]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[standing_anim]
		start_time=0
		[frame]
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50):200"
		[/frame]
		[frame]
			image="units/orcs/slayer-breeze-[1~3,2,1].png~GS()~CS(-50,-50,-50):[200*5]"
		[/frame]
	[/standing_anim]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/orcs/slayer.png~GS()~CS(-50,-50,-50)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=dagger
		description=_"dagger"
		icon=attacks/dagger-orcish.png~GS()~O(0.4)
		type=blade
		range=melee
		damage=6
		number=4
		[specials]
			{WEAPON_SPECIAL_BACKSTAB}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=throwing knives
		description=_"throwing knives"
		icon=attacks/dagger-thrown-poison-orcish.png~GS()~O(0.4)
		type=blade
		range=ranged
		damage=8
		number=2
		[specials]
			{WEAPON_SPECIAL_MARKSMAN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Assassin)}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=throwing knives
		[/filter_attack]
		missile_start_time=-150
		[missile_frame]
			duration=150
			image="projectiles/dagger-n.png~GS()~CS(-50,-50,-50)"
			image_diagonal="projectiles/dagger-ne.png~GS()~CS(-50,-50,-50)"
		[/missile_frame]
		start_time=-150
		[frame]
			image="units/orcs/slayer-ranged[1~2].png~GS()~CS(+100,-50,+100):[50,100]"
		[/frame]
		{SOUND:HIT_AND_MISS throwing-knife.ogg throwing-knife-miss.ogg -150}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=dagger
		[/filter_attack]
		start_time=-400
		offset=0.0~0.3:200,0.3~0.7:150,0.7~0.5:150,0.5~0.2:275,0.2~0.0:125
		[frame]
			image="units/orcs/slayer-attack-[1~14].png~GS()~CS(+120,-50,-50):[75*4,50*2,75*5,65,55,50]"
		[/frame]
		{SOUND:HIT_AND_MISS dagger-swish.wav {SOUND_LIST:MISS} -100}
	[/attack_anim]
[/unit_type]
