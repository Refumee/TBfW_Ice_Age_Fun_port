#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Captain
	name= _ "Shadow Captain"
	race=shadow
	image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
	small_profile="portraits/elves/captain.webp~GS()~CS(-66,-66,-66)~O(0.3)~CROP(8,60,370,380)"
	profile="portraits/elves/captain.webp~GS()~CS(-66,-66,-66)~O(0.3)"
	[leading_anim]
		start_time=-150
		[frame]
			image="units/elves-wood/captain-leading.png~GS()~CS(-66,-66,+100):300"
		[/frame]
	[/leading_anim]
	hitpoints=47
	movement_type=shadowfoot
	movement=5
	experience=85
	level=2
	alignment=neutral
	advances_to=Shadow Marshal
	cost=28
	usage=fighter
	description= _ "Shadow Captain lead the majority of shadow forces in battle. It is strange that such sergeants become heartened at the sight of each other, thus aiding one another in their battles."
	die_sound={SOUND_LIST:ELF_HIT}
	{DEFENSE_ANIM_RANGE "units/elves-wood/captain-defend.png~GS()~CS(-66,60,-66)" "units/elves-wood/captain.png~GS()~CS(-66,60,-66)" {SOUND_LIST:ELF_HIT} melee}
	{DEFENSE_ANIM_RANGE "units/elves-wood/captain-bow-defend.png~GS()~CS(-66,60,-66)" "units/elves-wood/captain-bow.png~GS()~CS(-66,60,-66)" {SOUND_LIST:ELF_HIT} ranged }
	[abilities]
		{ABILITY_LEADERSHIP}
	[/abilities]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/elves-wood/captain.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=sword
		description=_"sword"
		icon=attacks/sword-elven.png~GS()~O(0.4)
		type=blade
		range=melee
		damage=6
		number=4
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=bow
		description=_"bow"
		icon=attacks/bow-elven.png~GS()~O(0.4)
		type=pierce
		range=ranged
		damage=4
		number=4
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]

	[attack_anim]
		[filter_attack]
			name=bow
		[/filter_attack]
		missile_start_time=-150
		[missile_frame]
			duration=150
			image="projectiles/missile-n.png~GS()~CS(-66,-66,-66)"
			image_diagonal="projectiles/missile-ne.png~GS()~CS(-66,-66,-66)"
		[/missile_frame]
		start_time=-445
		[frame]
			image="units/elves-wood/captain-bow.png~GS()~CS(60,-66,60):65"
		[/frame]
		{SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
		[frame]
			image="units/elves-wood/captain-bow-attack[1~4].png~GS()~CS(60,-66,60):[75*2,100,130]"
		[/frame]
		[frame]
			image="units/elves-wood/captain-bow.png~GS()~CS(60,-66,60):65"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=sword
		[/filter_attack]
		start_time=-200
		[frame]
			image="units/elves-wood/captain.png~GS()~CS(80,-66,-66):25"
		[/frame]
		[frame]
			image="units/elves-wood/captain-melee-[2,1,2].png~GS()~CS(80,-66,-66):[75,200,75]"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -100}
		[frame]
			image="units/elves-wood/captain.png~GS()~CS(80,-66,-66):50"
		[/frame]
	[/attack_anim]
[/unit_type]
