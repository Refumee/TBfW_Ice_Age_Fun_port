#textdomain wesnoth-units
[unit_type]
	id=Shadow Enforcer
	name= _ "Shadow Enforcer"
	race=shadow
	gender=male,female
	image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
	hitpoints=85
	movement_type=shadowfoot
	movement=5
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=58
	usage=fighter
	profile=portraits/drakes/enforcer.webp
	description= _ "Not for Enforcers are the tactics of maneuver and deception; rather, they charge in wherever the melee is the fiercest. At close range, it matters little that their armor prevents them from spouting flame; all that matters is the power they’ve learned to focus in each strike. Drake leaders are careful not to besmirch the honor of the Enforcers, and generally call upon them to combat only the most pernicious of enemies."
	die_sound=drake-die.ogg
	{DEFENSE_ANIM_FILTERED ("units/drakes/enforcer-spear-defend-2.png~GS()~CS(-50,60,-50)") ("units/drakes/enforcer-spear-defend-1.png~GS()~CS(-50,60,-50)") {SOUND_LIST:DRAKE_HIT} (
		[filter_second_attack]
			type=pierce
		[/filter_second_attack]
	)}
	{DEFENSE_ANIM_FILTERED ("units/drakes/enforcer-blade-defend-2.png~GS()~CS(-50,60,-50)") ("units/drakes/enforcer-blade-defend-1.png~GS()~CS(-50,60,-50)") {SOUND_LIST:DRAKE_HIT} (
		[filter_second_attack]
			type=blade, impact
		[/filter_second_attack]
	)}
	{DEFENSE_ANIM_RANGE ("units/drakes/enforcer-spear-defend-2.png~GS()~CS(-50,60,-50)") ("units/drakes/enforcer-spear-defend-1.png~GS()~CS(-50,60,-50)") {SOUND_LIST:DRAKE_HIT} ranged}
	
	[resistance]
		blade=80
		pierce=80
		impact=80
		fire=80
		cold=80
		arcane=140
	[/resistance]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/drakes/enforcer.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=war talon
		description=_"war talon"
		type=blade
		range=melee
		damage=11
		number=4
		icon=attacks/scimitar.png~GS()~O(0.4)
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Fighter)}
		[/specials]
	[/attack]
	[attack]
		name=ram
		description=_"ram"
		type=impact
		range=melee
		damage=14
		number=3
		icon=attacks/ram.png~GS()~O(0.4)
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Mage)}
		[/specials]
	[/attack]
	[attack]
		name=trident
		description=_"trident"
		type=pierce
		range=melee
		damage=8
		number=5
		icon=attacks/trident.png~GS()~O(0.4)
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Assassin)}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=trident
		[/filter_attack]
		direction=s
		offset=0.0~0.1:200,0.1~0.4:150,0.4~0.0:150
		start_time=-300
		[frame]
			image="units/drakes/enforcer-spear-se-1.png~GS()~CS(80,-66,-66),units/drakes/enforcer-spear-s-[2~6].png~GS()~CS(80,-66,-66):100"
		[/frame]
		{SOUND:HIT_AND_MISS spear.ogg spear-miss.ogg -100}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=trident
		[/filter_attack]
		direction=se,sw,ne,n,nw
		offset=0.0~0.0:200,0.0~0.2:150,0.2~0.0:150
		start_time=-300
		[frame]
			image="units/drakes/enforcer-spear-se-[1~6].png~GS()~CS(80,-66,-66):100"
		[/frame]
		{SOUND:HIT_AND_MISS spear.ogg spear-miss.ogg -100}
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=war talon
		[/filter_attack]
		offset=0.0~0.2,0.2~0.7,0.7~0.2,0.2~0.0
		start_time=-300
		[frame]
			image="units/drakes/enforcer-blade.png~GS()~CS(80,-66,-66):25"
		[/frame]
		[frame]
			image="units/drakes/enforcer-blade-[1~6].png~GS()~CS(80,-66,-66):100"
		[/frame]
		{SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -75}
		[frame]
			image="units/drakes/enforcer-blade.png~GS()~CS(80,-66,-66):100"
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=ram
		[/filter_attack]
		offset=0.0~0.1:200,0.1~0.7:200,0.7~0.0:100
		start_time=-300
		[frame]
			image="units/drakes/enforcer-blade.png~GS()~CS(80,-66,-66):25"
		[/frame]
		[frame]
			image="units/drakes/enforcer-impact-[1~5].png~GS()~CS(80,-66,-66):100"
		[/frame]
		{SOUND:HIT_AND_MISS mace.ogg mace-miss.ogg -100}
		[frame]
			image="units/drakes/enforcer-blade.png~GS()~CS(80,-66,-66):100"
		[/frame]
	[/attack_anim]
	[female]
		name= _ "female^Drake Enforcer"
		gender=female
	[/female]
[/unit_type]
