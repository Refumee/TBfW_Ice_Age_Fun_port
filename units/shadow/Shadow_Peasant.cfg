#textdomain wesnoth-The_Ice_Age

[unit_type]
	id=Shadow Peasant
	name= _ "Shadow Peasant"
	profile="portraits/undead/walking-corpse.webp~GS()~CS(-66,-66,-66)~O(0.3)"
	race=shadow
	level=0
	experience=22
	alignment=neutral
	advances_to=Shadow Fighter
	cost=8
	usage=fighter
	description= _ "Shadow peasants are the lowest underlings of the shadow folk, ill advised to use as fighters. However, if they're throwing shadow peasants at you, they're clearly out of superior forces."
	die_sound={SOUND_LIST:ZOMBIE_WEAK_HIT}

	hitpoints=20
	movement_type=shadowfoot
	movement=5

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=touch
		description=_"touch"
		icon=attacks/touch-zombie.png~GS()~O(0.4)
		type=impact
		range=melee
		damage=5
		number=3
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]

	image="units/undead/zombie.png~GS()~CS(-66,-66,-66)"
	{DEFENSE_ANIM "units/undead/zombie-defend.png~GS()~CS(-66,+100,-66)" "units/undead/zombie.png~GS()~CS(-66,+100,-66)" {SOUND_LIST:ZOMBIE_WEAK_HIT} }
	[standing_anim]
		start_time=0
		[frame]
			image="units/undead/zombie-standing-[1~7,2].png~~GS()~CS(-66,-66,-66):[580,980,600,430,350*2,420,720]"
		[/frame]
	[/standing_anim]
	[standing_anim]
		start_time=0
		[frame]
			image="units/undead/zombie.png~GS()~CS(-66,-66,-66):150"
		[/frame]
	[/standing_anim]
	[death]
		start_time=0
		[frame]
			image="units/undead/zombie-die-[1~4].png~GS()~CS(+120,+120,-66):150,units/undead/soulless-die-[5~10].png~GS()~CS(+120,+120,-66):150"
		[/frame]
	[/death]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=s
		start_time=-200
		[frame]
			image="units/undead/zombie-attack-s.png~GS()~CS(+120,-66,-66):400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=n
		start_time=-200
		[frame]
			image="units/undead/zombie-attack-n.png~GS()~CS(+120,-66,-66):400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
	[attack_anim]
		[filter_attack]
			name=touch
		[/filter_attack]
		direction=se,sw,ne,nw
		start_time=-200
		[frame]
			image="units/undead/zombie-attack.png~GS()~CS(+120,-66,-66):400"
			sound=zombie-attack.wav
		[/frame]
	[/attack_anim]
	
[/unit_type]
