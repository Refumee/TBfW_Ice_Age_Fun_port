#textdomain wesnoth-units
[unit_type]
	id=Shadow Trooper
	name= _ "Shadow Trooper"
	race=shadow
	image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
	profile="portraits/humans/iron-mauler.webp~GS()~CS(-66,-66,-66)~O(0.3)~RIGHT()"
	hitpoints=85
	movement_type=shadowfoot
	movement=5
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=49
	description= _ "Shadow Troopers are the hulking shadows of the most powerful warriors. Their very presence is frightening enough to scare most, and their shadow maces deliver mighty blows to their opponents. During the War of Imprisonment, Geannan used them as guardians of his secret fortress, Mok-Tal."
	die_sound=wail-long.wav
	usage=fighter
	[resistance]
		blade=80
		pierce=80
		impact=80
	[/resistance]
	{DEFENSE_ANIM "units/human-loyalists/siegetrooper-defend-1.png~GS()~CS(-66,60,-66)" "units/human-loyalists/siegetrooper-defend-2.png~GS()~CS(-66,60,-66)" {SOUND_LIST:HUMAN_HIT} }

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/human-loyalists/siegetrooper.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=flail
		description=_"flail"
		icon=attacks/morning-star.png~GS()~O(0.4)
		type=impact
		range=melee
		damage=25
		number=2
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Fighter)}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=flail
		[/filter_attack]
		start_time=-260
		[frame]
			image="units/human-loyalists/siegetrooper-attack-[1~6].png~GS()~CS(80,-66,-66):[85,100,125,50*3]"
		[/frame]
		{SOUND:HIT_AND_MISS flail.ogg flail-miss.ogg -260}
	[/attack_anim]
[/unit_type]
