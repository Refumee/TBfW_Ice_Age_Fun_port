#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Hunter
	name= _ "Shadow Hunter"
	race=shadow
	image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
	profile="portraits/humans/spearman.webp~GS()~CS(-66,-66,-66)~O(0.3)"
	hitpoints=36
	movement_type=shadowfoot
	movement=5
	experience=42
	level=1
	alignment=neutral
	advances_to=Shadow Sportsman
	cost=16
	usage=fighter
	description= _ "One of the most important skills to the Lucht Oighir was the ability to handle a spear on the hunt. Though they typically aren't used for fighting, they can be ready if need be at a moment's notice. They can move quickly and silently through the hunting grounds they hold dear."
	die_sound={SOUND_LIST:HUMAN_DIE}
	{DEFENSE_ANIM "units/human-iceage/Fighter.png~GS()~CS(-50,60,-50)" "units/human-iceage/Fighter.png~GS()~CS(-50,60,-50)" {SOUND_LIST:HUMAN_HIT} }

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/human-iceage/Fighter.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=spear
		description=_"Hunting Spear"
		type=pierce
		range=melee
		damage=7
		number=3
		icon=attacks/spear-orcish.png~GS()~O(0.4)
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack]
		name=javelin
		description=_"Fishing Spear"
		icon=attacks/javelin-orcish.png~GS()~O(0.4)
		type=pierce
		range=ranged
		damage=4
		number=2
		[specials]
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Peasant)}
		[/specials]
	[/attack]
	[attack_anim]
		[filter_attack]
			name=javelin
		[/filter_attack]
		[missile_frame]
			begin=-150
			end=0
			image="projectiles/spear-n.png~GS()~CS(-66,-66,-66)"
			image_diagonal="projectiles/spear-ne.png~GS()~CS(-66,-66,-66)"
		[/missile_frame]
		[frame]
			begin=-250
			end=-150
			image="units/human-iceage/Fighter.png~GS()~CS(60,-66,60)"
			sound={SOUND_LIST:THROW}
		[/frame]
		[frame]
			begin=-150
			end=-100
			image="units/human-iceage/Fighter.png~GS()~CS(60,-66,60)"
		[/frame]
		[if]
			hits=yes
			[frame]
				begin=-100
				end=-50
				image="units/human-iceage/Fighter.png~GS()~CS(60,-66,60)"
				sound=spear.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-100
				end=-50
				image="units/human-iceage/Fighter.png~GS()~CS(60,-66,60)"
			[/frame]
		[/else]
		[frame]
			begin=-50
			end=50
			image="units/human-iceage/Fighter.png~GS()~CS(60,-66,60)"
		[/frame]
	[/attack_anim]
