#textdomain wesnoth-The_Ice_Age
[unit_type]
	id=Shadow Phantarch
	name= _ "Shadow Phantarch"
	race=shadow
	gender=male,female
	image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
	profile="portraits/humans/mage-light.png~GS()~CS(-66,-66,-66)~O(0.3)"
	hitpoints=60
	movement_type=shadowfoot
	movement=5
	experience=150
	level=3
	alignment=neutral
	advances_to=null
	{AMLA_DEFAULT}
	cost=64
	usage=mixed fighter
	description= _ "The Pen-Derwydd, head druid, or 'Phantarch' is often the wisest of the bardic profession. They are loners, usually not following or being a member of a retinue as the bards are. The time spent in solitude has helped them to fully understand the things of the spirit, something they can use to devastating effect on the battlefield."
	die_sound={SOUND_LIST:HUMAN_OLD_DIE}
	{DEFENSE_ANIM "units/human-iceage/Phantarch.png~GS()~CS(-66,60,-66)" "units/human-iceage/Phantarch.png~GS()~CS(-66,60,-66)" {SOUND_LIST:HUMAN_OLD_HIT} }
	[abilities]
		{ABILITY_REGENERATES}
	[/abilities]

	[recruit_anim]
		[frame]
			begin=-200
			end=100
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-6.png"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-7.png"
		[/frame]
		[frame]
			begin=200
			end=300
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-8.png"
		[/frame]
		[frame]
			begin=300
			end=400
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-9.png"
		[/frame]
		[frame]
			begin=400
			end=500
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-10.png"
		[/frame]
		[frame]
			begin=500
			end=600
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-11.png"
		[/frame]
		[frame]
			begin=600
			end=700
			image="units/human-iceage/Phantarch.png~GS()~CS(-66,-66,-66)"
			halo="halo/smoke/poison-smoke-12.png"
		[/frame]
	[/recruit_anim]

	[attack]
		name=morning star
		description=_"Morning Star"
		type=impact
		range=melee
		damage=6
		number=3
		icon=attacks/morning-star.png~GS()~O(0.4)
		[specials]
			{WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_COLD}
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Mage)}
		[/specials]
	[/attack]
	[attack]
		name=missile
		description=_"missile"
		icon=attacks/magic-missile.png~GS()~O(0.4)
		type=cold
		range=ranged
		[specials]
			{WEAPON_SPECIAL_PLAGUE_TYPE (Shadow Mage)}
			{WEAPON_SPECIAL_MAGICAL}
		[/specials]
		damage=16
		number=3
	[/attack]

	[attack_anim]
		[filter_attack]
			name=missile
		[/filter_attack]

		offset=0

		{MAGIC_MISSILE 11 -20}
		{MAGIC_MISSILE_STAFF_FLARE -750 600 11 -20}

		[frame]
			begin=-800
			end=-700
			image="units/human-iceage/Phantarch.png~GS()~CS(60,-66,60)"
		[/frame]
		[frame]
			begin=-700
			end=-350
			image="units/human-iceage/Phantarch.png~GS()~CS(60,-66,60)"
		[/frame]
		[if]
			hits=no
			[frame]
				begin=-350
				end=-100
				image="units/human-iceage/Phantarch.png~GS()~CS(60,-66,60)"
				sound=magic-missile-1-miss.ogg,magic-missile-2-miss.ogg,magic-missile-3-miss.ogg
			[/frame]
		[/if]
		[else]
			hits=yes
			[frame]
				begin=-350
				end=-100
				image="units/human-iceage/Phantarch.png~GS()~CS(60,-66,60)"
				sound=magic-missile-1.ogg,magic-missile-2.ogg,magic-missile-3.ogg
			[/frame]
		[/else]
		[frame]
			begin=-100
			end=100
			image="units/human-iceage/Phantarch.png~GS()~CS(60,-66,60)"
		[/frame]
	[/attack_anim]

	[attack_anim]
		[filter_attack]
			name=morning star
		[/filter_attack]
		[if]
			hits=yes
			[frame]
				begin=-200
				end=-175
				image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
				sound=flail.ogg
			[/frame]
		[/if]
		[else]
			hits=no
			[frame]
				begin=-200
				end=-175
				image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
				sound=flail-miss.ogg
			[/frame]
		[/else]
		[frame]
			begin=-175
			end=-100
			image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
		[/frame]
		[frame]
			begin=-100
			end=25
			image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
		[/frame]
		[frame]
			begin=25
			end=100
			image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
		[/frame]
		[frame]
			begin=100
			end=200
			image="units/human-iceage/Phantarch.png~GS()~CS(80,-66,-66)"
		[/frame]
	[/attack_anim]
	[female]
		name= _ "female^Pen-derwydd"
		gender=female
		image="units/human-iceage/Pen-derwydd.png~GS()~CS(-66,-66,-66)"
		profile="portraits/humans/mage-light+female.png~GS()~CS(-66,-66,-66)~O(0.3)"
		die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
