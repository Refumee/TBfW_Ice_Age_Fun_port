#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Saber_Tooth_Kitty
    name= _ "Saber Tooth Kitty"
    race=monster
    image="units/monsters/cat/redtail-cat.png"
    profile="portraits/monsters/redtail-cat.webp"
    hitpoints=30
    movement_type=iceagefoot
    movement=8
    experience=30
    level=1
    alignment=neutral
    advances_to=Saber_Tooth_Tiger,Rabid_Sabre
    undead_variation=mounted
    cost=18
    usage=scout
    description=_ "Sabre-tooth kitties are the young Sabre-tooth tigers that once posed common threat to man and beast alike."
    die_sound=jaguar-hit.ogg
    [resistance]
        cold=50
        pierce=100
        impact=90
        arcane=100
    [/resistance]
    [defense]
        village=50
    [/defense]    
    [abilities]
        {ABILITY_SKIRMISHER}
    [/abilities]
    [attack]
        name=fangs
        description=_"fangs"
        icon=attacks/saber-human.png
        type=pierce
        range=melee
        damage=6
        number=2
        [specials]
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
    [/attack] 
    [attack]
        name=bite
        description=_"bite"
        icon=attacks/fangs-animal.png
        type=blade
        range=melee
        damage=4
        number=3
    [/attack]
    [standing_anim]
        {STANDING_COMBAT_FILTER}
        start_time=-50
        [frame]
            image="units/monsters/cat/redtail-cat.png~SCALE(63,63):800"
        [/frame]
        [frame]
            image="units/monsters/cat/redtail-cat-s[1,2,3,2].png~SCALE(63,63):[400,300*3]"
        [/frame]
    [/standing_anim]
    [idle_anim]
        {STANDING_COMBAT_FILTER}
        start_time=0
        [frame]
            image="units/monsters/cat/redtail-cat-s[1,2,1,2,1~8].png~SCALE(63,63):[350*2,150*4,100,75*4,125]"
        [/frame]
    [/idle_anim]
    [standing_anim]
        start_time=-50
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/redtail-cat-sitting.png~SCALE(63,63):150"
        [/frame]
    [/standing_anim]
    [pre_movement_anim]
        start_time=0
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/redtail-cat-transition[2,1].png~SCALE(63,63):100"
        [/frame]
    [/pre_movement_anim]
    [post_movement_anim]
        start_time=0
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/redtail-cat-transition[1,2].png~SCALE(63,63):100"
        [/frame]
    [/post_movement_anim]
    [movement_anim]
        start_time=0
        [frame]
            image="units/monsters/cat/redtail-cat.png~SCALE(63,63):150"
        [/frame]
    [/movement_anim]
    {DEFENSE_ANIM_FILTERED "units/monsters/cat/redtail-cat-defend2.png~SCALE(63,63)" "units/monsters/cat/redtail-cat-defend1.png~SCALE(63,63)" {SOUND_LIST:DRAKE_HIT} (
        [filter_second_attack]
            name=bite
        [/filter_second_attack]
    )}
    {DEFENSE_ANIM_FILTERED "units/monsters/cat/redtail-cat-defend2.png~SCALE(63,63)" "units/monsters/cat/redtail-cat-defend1.png~SCALE(63,63)" {SOUND_LIST:DRAKE_HIT} (
        [filter_second_attack]
            name=fangs
        [/filter_second_attack]
    )}
    [attack_anim]
        [filter_attack]
            name=bite
        [/filter_attack]
        offset=0.0~-0.05:450,-0.05~0.6:150,0.6~0.0:250
        start_time=-500
        [frame]
            image="units/monsters/cat/redtail-cat-bite[1~6].png~SCALE(63,63):[125*4,150,200]"
        [/frame]
        {SOUND:HIT_AND_MISS bite.ogg {SOUND_LIST:MISS} -100}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=fangs
        [/filter_attack]
        offset=0.0~-0.05:450,-0.05~0.6:150,0.6~0.0:250
        start_time=-500
        [frame]
            image="units/monsters/cat/redtail-cat-bite[1~6].png~SCALE(63,63):[125*4,150,200]"
        [/frame]
        {SOUND:HIT_AND_MISS bite.ogg {SOUND_LIST:MISS} -100}
    [/attack_anim]
[/unit_type]