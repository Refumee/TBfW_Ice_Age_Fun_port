#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Saber_Tooth_Tiger
    name= _ "Saber Tooth Tiger"
    race=monster
    image="units/monsters/cat/jumpcat.png"
    profile="portraits/monsters/jumpcat.webp"
    hitpoints=50
    movement_type=iceagefoot
    movement=8
    experience=150
    {AMLA_DEFAULT}
    level=2
    alignment=neutral
    advances_to=null
    undead_variation=mounted
    cost=25
    usage=scout
    description=_ "The Saber-tooth tigers are aggressive animals. Their long fangs and powerful jaws make an unarmed confrontation foolhardy at the least."
    die_sound=jaguar-hit.ogg
    [resistance]
        cold=50
        pierce=100
        impact=90
        arcane=100
    [/resistance]
    [defense]
        village=50
    [/defense]    
    [abilities]
        {ABILITY_SKIRMISHER}
        {ABILITY_FEEDING}
    [/abilities]
    [standing_anim]
        start_time=-50
        [frame]
            image="units/monsters/cat/jumpcat.png:150"
        [/frame]
    [/standing_anim]
    [standing_anim]
        start_time=-50
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/jumpcat.png:150"
        [/frame]
    [/standing_anim]
    # TO DO
#ifdef __UNUSED__
    [pre_movement_anim]
        start_time=0
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/tritail-transition[2,1].png:100"
        [/frame]
    [/pre_movement_anim]
    [post_movement_anim]
        start_time=0
        {STANDARD_IDLE_FILTER}
        [frame]
            image="units/monsters/cat/tritail-transition[1,2].png:100"
        [/frame]
    [/post_movement_anim]
    [movement_anim]
        start_time=0
        [frame]
            image="units/monsters/cat/tritail.png:150"
        [/frame]
    [/movement_anim]
#endif
    {DEFENSE_ANIM_FILTERED "units/monsters/cat/jumpcat-defend2.png" "units/monsters/cat/jumpcat-defend1.png" {SOUND_LIST:DRAKE_HIT} (
        hits=yes
    )}
    {DEFENSE_ANIM_FILTERED "units/monsters/cat/jumpcat-defend2-miss.png" "units/monsters/cat/jumpcat-defend1.png" {SOUND_LIST:DRAKE_HIT} (
        hits=no
    )}
    [attack]
        name=fangs
        description=_"fangs"
        icon=attacks/saber-human.png
        type=pierce
        range=melee
        damage=10
        number=2
        [specials]
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
    [/attack] 
    [attack]
        name=bite
        description=_"bite"
        icon=attacks/fangs-animal.png
        type=blade
        range=melee
        damage=6
        number=3
    [/attack]
    [attack_anim]
        [filter_attack]
            name=fangs
        [/filter_attack]
        offset=0.0~-0.08:270,-0.08~0.6:100,0.6~0.0:250
        start_time=-370
        [frame]
            image="units/monsters/cat/jumpcat-claws[1~5].png:[90,90,100,100,240]"
        [/frame]
        [frame]
            image="units/monsters/cat/jumpcat.png:1"
        [/frame]
        {SOUND:HIT claws.ogg -100}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=bite
        [/filter_attack]
        offset=0.0~-0.08:270,-0.08~0.6:100,0.6~0.0:250
        start_time=-370
        [frame]
            image="units/monsters/cat/jumpcat-claws[1~5].png:[90,90,100,100,240]"
        [/frame]
        [frame]
            image="units/monsters/cat/jumpcat.png:1"
        [/frame]
        {SOUND:HIT claws.ogg -100}
    [/attack_anim]
[/unit_type]
