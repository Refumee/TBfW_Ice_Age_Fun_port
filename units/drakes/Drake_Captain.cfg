#textdomain wesnoth-The_Ice_Age
[unit_type]
    id=Drake Captain
    name= _ "Drake Captain"
    race=drake
    image="units/drakes/lord.png"
    profile="portraits/drake-captain.webp"
    hitpoints=55
    movement_type=drakefly
    movement=5
    experience=80
    level=3
    alignment=lawful
    advances_to=null
    undead_variation=drake
    cost=35
    usage=mixed fighter
    description= _ "Drakes are an old race, wise enough to hearken to their own natural leaders. Those who are called 'captains' by their enemies are the drakes who aspire to be such leaders, both in war and in peace."
    die_sound=drake-die.ogg
    {DEFENSE_ANIM "units/drakes/lord-defend.png" "units/drakes/lord.png" {SOUND_LIST:DRAKE_HIT} }
    {LEADING_ANIM "units/drakes/lord-leading.png" "units/drakes/lord.png" 39,-29}
    [movement_anim]
        [frame]
            begin=0
            end=150
            image="units/drakes/captain-flying.png"
        [/frame]
    [/movement_anim]
    [abilities]
        {ABILITY_LEADERSHIP}
    [/abilities]
    [standing_anim]
        start_time=0
        [filter]
            [filter_location]
                terrain_type=!,W*,Qx*,Ql*
                [or]
                    terrain_type=Ww,Ww*,Wwr*,Ch*,Wsz,Wdz,*^V*
                [/or]
            [/filter_location]
        [/filter]
        [frame]
            duration=150
            image=units/drakes/lord.png
        [/frame]
    [/standing_anim]
    [standing_anim]
        start_time=0
        layer=60
        submerge=0.01
        [filter]
            [filter_location]
                terrain_type=W*,Qx*,Ql*
                [not]
                    terrain_type=Ww,Ww*,Wwr*,Ch*,Wsz,Wdz,*^V*
                [/not]
            [/filter_location]
        [/filter]
        [frame]
            image="units/drakes/lord-fly-[1~5,4].png:100"
        [/frame]
        [frame]
            image="units/drakes/lord-fly-[3,2]-upstroke.png:100"
        [/frame]
    [/standing_anim]
    [movement_anim]
        [frame]
            image="units/drakes/lord-fly-[1~5,4].png:100"
        [/frame]
        [frame]
            image="units/drakes/lord-fly-[3,2]-upstroke.png:100"
        [/frame]
    [/movement_anim]
    [attack]
        name=sword
        description=_"sword"
        type=blade
        range=melee
        damage=10
        number=3
        icon=attacks/scimitar.png
    [/attack]
    [attack]
        name=fire breath
        description=_"fire breath"
        icon=attacks/fire-breath-drake.png
        type=fire
        range=ranged
        damage=9
        number=4
    [/attack]
    [attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        offset=0.0~0.3,0.3~0.5,0.5~0.60,0.60~0.0

        start_time=-250
        [frame]
            image="units/drakes/lord-melee-[1~3].png:[100*2,150]"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -50}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=fire breath
        [/filter_attack]
        {MISSILE_FRAME_FIRE_BREATH 8,-50 8,50 35,-20 35,40}

        start_time=-900
        [frame]
            image="units/drakes/lord.png:520"
        [/frame]
        {SOUND:HIT_AND_MISS flame-big.ogg flame-big-miss.ogg -480}
        [frame]
            image="units/drakes/lord-ranged-[1~2,1].png:[150,200,150]"
        [/frame]
    [/attack_anim]
[/unit_type]
