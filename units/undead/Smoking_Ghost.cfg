#textdomain wesnoth-The_Ice_Age
[unit_type]
	[base_unit]
		id=Ghost
	[/base_unit]
	id=IAGhost
	name= _ "Addicted Ghost"
	profile=portraits/transparent/smoke-ghost.png
	hitpoints=30
	experience=70
	level=2
	advances_to=null
	description= _ "Enslaved within a shroud of addiction, this is a trapped spirit with a serious problem. Taking his addiction from the life he had before, his ghost continues to haunt the land of the living, and smokes three packs a day. Dugongs, stay away from this Smokin' Ghost."

	[attack]
		name=touch
		description=_"touch"
		icon=attacks/touch-undead.png
		type=arcane
		range=melee
		damage=7
		number=3
		[specials]
			{WEAPON_SPECIAL_DRAIN}
		[/specials]
	[/attack]
	[attack]
		name=wail
		description=_"Smoke Puff"
		type=fire
		range=ranged
		damage=14
		number=3
	[/attack]
	[attack_anim]
		[filter_attack]
			name=wail
		[/filter_attack]
		{MISSILE_FRAME_MUZZLE_FLARE_HIT_SOUTH 0 0}
		start_time=-200

		[if]
			direction=s,se,sw
			[frame]
				duration=25
				image="units/undead-spirit/ghost-s-2.png"
			[/frame]
			[frame]
				duration=75
				image="units/undead-spirit/ghost-s-attack-1.png"
			[/frame]
			[frame]
				duration=150
				image="units/undead-spirit/ghost-s-attack-2.png"
				sound=thunderstick.ogg
			[/frame]
			[frame]
				duration=75
				image="units/undead-spirit/ghost-s-attack-1.png"
			[/frame]
			[frame]
				duration=25
				image="units/undead-spirit/ghost-s-2.png"
			[/frame]
		[/if]
		[else]
		{MISSILE_FRAME_MUZZLE_FLARE_HIT_NORTH 0 0}
			direction=n,ne,nw
			[frame]
				duration=25
				image="units/undead-spirit/ghost-n-2.png"
			[/frame]
			[frame]
				duration=75
				image="units/undead-spirit/ghost-n-attack-1.png"
			[/frame]
			[frame]
				duration=150
				image="units/undead-spirit/ghost-n-attack-2.png"
				sound=thunderstick.ogg
			[/frame]
			[frame]
				duration=75
				image="units/undead-spirit/ghost-n-attack-1.png"
			[/frame]
			[frame]
				duration=25
				image="units/undead-spirit/ghost-n-2.png"
			[/frame]
		[/else]
	[/attack_anim]

[/unit_type]
