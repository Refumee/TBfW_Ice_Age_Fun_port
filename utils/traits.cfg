#textdomain wesnoth-The_Ice_Age

#define TRAIT_SHADOW
    # Units with trait Undead cannot be drained, poisoned, or plagued.
    [trait]
        id=shadow
        availability="musthave"
        male_name= _ "shadow"
        female_name= _ "female^shadow"
        description= _ "Immune to drain, poison, and plague"
        help_text= _ "<italic>text='Shadow'</italic> units are immune to poison, drain, and plague."
        [effect]
            apply_to=status
            add=unpoisonable
        [/effect]
        [effect]
            apply_to=status
            add=undrainable
        [/effect]
        [effect]
            apply_to=status
            add=unplagueable
        [/effect]
    [/trait]
#enddef