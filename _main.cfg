#textdomain wesnoth-The_Ice_Age
[textdomain]
    name="wesnoth-The_Ice_Age"
    path="data/add-ons/The_Ice_Age/translations"
[/textdomain]
[campaign]
    id=IceAgeFun
    name= _ "Ice Age Fun: Exodus"
    abbrev= _ "IAF"
    rank=110
    define=CAMPAIGN_THE_ICE_AGE
    first_scenario=00_Prologue
    icon="data/add-ons/The_Ice_Age/images/items/skirmisher-frozen.png"
    image="data/add-ons/The_Ice_Age/images/campaign-image-IAF.png"
    description= _ "Jobath, a young cheiftan living in the Wesnothian Ice Age (approximately 400 BW) finds trouble when multiple enemies threaten his home. The travels of him and his friends could take them beyond the world's end in their pursuit of justice. (Not quite balanced; any questions, comments, or suggestions would be greatly appreciated. Just look up 'Ice Age' on the forums.)"
    {CAMPAIGN_DIFFICULTY EASY   "data/add-ons/The_Ice_Age/images/units/human-iceage/Fighter.png" ( _ "Hunter") ( _ "Novice")}
    {CAMPAIGN_DIFFICULTY NORMAL "data/add-ons/The_Ice_Age/images/units/bird-mount.png" ( _ "Bird Mount") ( _ "Normal")} {DEFAULT_DIFFICULTY}
    {CAMPAIGN_DIFFICULTY HARD   "units/human-outlaws/ranger.png" ( _ "Chieftain") ( _ "Not so Easy")}
	
	{ENABLE_ADVANCEMENT "Dread Bat" "Cave Bat" ()}
	
    [about]
        title = _ "Campaign Design, Ideas, and Coding."
        [entry]
            name = "Mountain_King and King_Link"
        [/entry]
    [/about]
    [about]
        title = _ "Images"
        [entry]
            name = "Mountain_King and King_Link"
            comment = "Many custom images"
        [/entry]
        [entry]
            name = "SFault"
            comment = "Geannan unit images"
        [/entry]
        [entry]
            name = "Alarantara and doofus-01"
            comment = "Mine Rails and snowy terrains"
        [/entry]
        [entry]
            name = "Trashman"
            comment = "Dark Knight Sprites"
        [/entry]
        [entry]
            name = "someonenamedme"
            comment = "Bard/Banfaith Sprites"
        [/entry]
        [entry]
            name = "thespaceinvader"
            comment = "Spearman, Sportsman and Jobath sprites."
        [/entry]
        [entry]
            name = "mechanical"
            comment = "Mammoth and Rhino sprite."
        [/entry]
    [/about]
    [about]
        title = _ "Tracking map"
        [entry]
            name = "Mountain_King"
            comment = "original basics"
        [/entry]
        [entry]
            name = "eliddel"
            comment = "applier of AWESOMENESS"
        [/entry]
    [/about]
[/campaign]
